<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Live Draft — Best Ball Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0f14;
      --panel:    #111827;
      --card:     #1a2233;
      --border:   #2a3f5f;
      --accent:   #4fc3f7;
      --green:    #81c784;
      --red:      #ef5350;
      --orange:   #ff9800;
      --text:     #e0e0e0;
      --muted:    #78909c;
      --QB:       #e91e63;
      --RB:       #2196f3;
      --WR:       #4caf50;
      --TE:       #ff9800;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .hdr {
      background: #0d1520;
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hdr-title { font-weight: 700; font-size: 1em; color: var(--accent); }
    .hdr-meta  { font-size: 0.78em; color: var(--muted); text-align: right; }
    .hdr-meta span { color: var(--text); font-weight: 600; }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #0d1520;
      position: sticky;
      top: 45px;
      z-index: 99;
    }
    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 0.78em;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      transition: color 0.15s;
    }
    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-panel { display: none; padding: 12px; }
    .tab-panel.active { display: block; }

    /* ── Picks tab ── */
    .pick-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .pick-controls button {
      flex: 1;
      padding: 10px 8px;
      border-radius: 6px;
      border: none;
      font-size: 0.85em;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-mine     { background: var(--accent); color: #000; }
    .btn-opp      { background: var(--border); color: var(--text); }
    .btn-undo     { background: transparent; border: 1px solid var(--border) !important; color: var(--muted); flex: 0 0 44px; font-size: 1em; }
    button:active { opacity: 0.7; }

    /* Search */
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.95em;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1em;
      pointer-events: none;
    }
    .pos-filters {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
    }
    .pos-btn {
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.78em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pos-btn.active { color: #fff; border-color: transparent; }
    .pos-btn[data-pos="ALL"].active { background: var(--accent); color: #000; }
    .pos-btn[data-pos="QB"].active  { background: var(--QB); }
    .pos-btn[data-pos="RB"].active  { background: var(--RB); }
    .pos-btn[data-pos="WR"].active  { background: var(--WR); }
    .pos-btn[data-pos="TE"].active  { background: var(--TE); }

    /* Player list */
    .player-list { display: flex; flex-direction: column; gap: 4px; max-height: 45vh; overflow-y: auto; }
    .player-row {
      display: flex;
      align-items: center;
      background: var(--card);
      border-radius: 6px;
      padding: 8px 10px;
      gap: 10px;
      border-left: 3px solid transparent;
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .player-row:active { background: #1e2d44; }
    .player-row.taken  { opacity: 0.32; }
    .player-row.selected { background: #1a2d4d; border-left-color: var(--accent); }
    .player-row[data-pos="QB"] { border-left-color: var(--QB); }
    .player-row[data-pos="RB"] { border-left-color: var(--RB); }
    .player-row[data-pos="WR"] { border-left-color: var(--WR); }
    .player-row[data-pos="TE"] { border-left-color: var(--TE); }
    .player-row.taken[data-pos] { border-left-color: transparent; }
    .adp-badge {
      min-width: 32px;
      text-align: center;
      font-size: 0.72em;
      color: var(--muted);
      font-weight: 700;
    }
    .p-name { flex: 1; font-weight: 600; font-size: 0.88em; }
    .p-meta { font-size: 0.75em; color: var(--muted); }
    .taken-by {
      font-size: 0.7em;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
    }
    .taken-by.mine { background: #1a3a4d; color: var(--accent); }
    .taken-by.opp  { background: #2d1a1a; color: var(--muted); }

    /* Action bar (appears on row selection) */
    .action-bar {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
      animation: slideDown 0.15s ease;
    }
    .action-bar.visible { display: flex; }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .action-bar button {
      flex: 1;
      padding: 11px;
      border-radius: 8px;
      border: none;
      font-size: 0.9em;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Recs tab ── */
    .rec-card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid var(--accent);
      position: relative;
    }
    .rec-card:first-child { border-left-color: var(--green); }
    .rec-rank {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 0.72em;
      color: var(--muted);
      font-weight: 700;
    }
    .rec-name { font-weight: 700; font-size: 1em; margin-bottom: 3px; }
    .rec-pos  { display: inline-block; font-size: 0.72em; font-weight: 700; padding: 1px 6px; border-radius: 3px; color: #fff; margin-right: 4px; }
    .rec-pos.QB { background: var(--QB); }
    .rec-pos.RB { background: var(--RB); }
    .rec-pos.WR { background: var(--WR); }
    .rec-pos.TE { background: var(--TE); }
    .rec-adp  { font-size: 0.78em; color: var(--muted); }
    .rec-reason { font-size: 0.78em; color: #90a4ae; margin-top: 5px; }
    .rec-pick-btn {
      margin-top: 8px;
      padding: 6px 12px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      font-size: 0.82em;
      font-weight: 700;
      cursor: pointer;
    }
    .no-recs { text-align: center; color: var(--muted); padding: 40px 0; font-style: italic; }

    /* Pick counter banner */
    .pick-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pick-banner .big { font-size: 1.2em; font-weight: 700; color: var(--accent); }
    .pick-banner .lbl { font-size: 0.72em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .my-turn-badge {
      background: var(--green);
      color: #000;
      font-size: 0.75em;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 12px;
    }
    .not-turn-badge {
      background: #1a2233;
      color: var(--muted);
      font-size: 0.75em;
      padding: 3px 10px;
      border-radius: 12px;
    }

    /* ── Roster tab ── */
    .roster-pos-section { margin-bottom: 14px; }
    .pos-header {
      font-size: 0.7em;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .roster-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border-radius: 6px;
      padding: 6px 10px;
      margin: 3px 3px 3px 0;
      font-size: 0.82em;
      border-left: 3px solid transparent;
    }
    .roster-chip.QB { border-left-color: var(--QB); }
    .roster-chip.RB { border-left-color: var(--RB); }
    .roster-chip.WR { border-left-color: var(--WR); }
    .roster-chip.TE { border-left-color: var(--TE); }
    .roster-chip .rnd { font-size: 0.75em; color: var(--muted); }
    .needs-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .need-box {
      flex: 1;
      background: var(--card);
      border-radius: 6px;
      padding: 8px;
      text-align: center;
    }
    .need-box .need-pos { font-size: 0.65em; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
    .need-box .need-val { font-size: 1.1em; font-weight: 700; margin-top: 2px; }
    .stack-summary { margin-top: 4px; }
    .stack-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #1a2d4d;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 10px;
      margin: 3px 3px 0 0;
      font-size: 0.78em;
    }

    /* ── Settings tab ── */
    .settings-grid { display: flex; flex-direction: column; gap: 14px; }
    .setting-group label {
      display: block;
      font-size: 0.75em;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    .setting-group select,
    .setting-group input[type=number] {
      width: 100%;
      padding: 9px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95em;
    }
    .settings-hint { font-size: 0.78em; color: var(--muted); margin-top: 4px; }
    .btn-full {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 0.95em;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      margin-top: 8px;
    }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger  { background: transparent; border: 1px solid var(--red) !important; color: var(--red); }

    /* Loading spinner */
    .spinner {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 0.9em;
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🏈 Live Draft</div>
  <div class="hdr-meta">
    Pick <span id="hdrPick">—</span> &nbsp;·&nbsp; Rd <span id="hdrRound">—</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="recs">Recs</div>
  <div class="tab" data-tab="picks">Draft</div>
  <div class="tab" data-tab="roster">Roster</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- ── Recs Tab ── -->
<div id="tab-recs" class="tab-panel active">
  <div class="pick-banner">
    <div>
      <div class="lbl">Overall Pick</div>
      <div class="big" id="pickNum">—</div>
    </div>
    <div>
      <div class="lbl">Round</div>
      <div class="big" id="roundNum">—</div>
    </div>
    <div id="turnBadge" class="not-turn-badge">—</div>
  </div>

  <div id="recsList">
    <div class="no-recs">Configure settings, then start adding picks.</div>
  </div>
</div>

<!-- ── Picks Tab ── -->
<div id="tab-picks" class="tab-panel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search player name or team…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>

  <div class="pos-filters">
    <button class="pos-btn active" data-pos="ALL">ALL</button>
    <button class="pos-btn" data-pos="QB">QB</button>
    <button class="pos-btn" data-pos="RB">RB</button>
    <button class="pos-btn" data-pos="WR">WR</button>
    <button class="pos-btn" data-pos="TE">TE</button>
  </div>

  <!-- Action bar (shown when player selected) -->
  <div class="action-bar" id="actionBar">
    <button class="btn-mine" id="btnMyPick">✓ My Pick</button>
    <button class="btn-opp"  id="btnOppPick">→ Opponent</button>
    <button class="btn-undo" id="btnCancel" title="Cancel">✕</button>
  </div>

  <div class="player-list" id="playerList">
    <div class="spinner">Loading players…</div>
  </div>
</div>

<!-- ── Roster Tab ── -->
<div id="tab-roster" class="tab-panel">
  <div class="needs-row" id="needsRow"></div>
  <div class="stack-summary" id="stackSummary"></div>
  <div id="rosterDisplay" style="margin-top:12px;"></div>
</div>

<!-- ── Settings Tab ── -->
<div id="tab-settings" class="tab-panel">
  <div class="settings-grid">
    <div class="setting-group">
      <label>My Draft Position (1–12)</label>
      <input type="number" id="myPosition" min="1" max="12" value="1">
      <div class="settings-hint">Which pick slot are you? (1 = first overall)</div>
    </div>
    <div class="setting-group">
      <label>Number of Teams</label>
      <input type="number" id="numTeams" min="8" max="16" value="12">
    </div>
    <div class="setting-group">
      <label>Stack Intensity</label>
      <select id="stackIntensity">
        <option value="off">Off — pure ADP/positional value</option>
        <option value="light">Light — small nudge toward stackmates</option>
        <option value="medium" selected>Medium — balanced (recommended)</option>
        <option value="heavy">Heavy — aggressively stack your QB</option>
      </select>
    </div>
    <div class="setting-group">
      <label>RB Priority (early rounds)</label>
      <select id="rbPriority">
        <option value="off">Off — RBs compete on ADP only</option>
        <option value="mild">Mild — slight boost (×1.10)</option>
        <option value="strong" selected>Strong — target 2 RBs in rounds 1–3 (×1.20)</option>
        <option value="extreme">Extreme — RB heavy (×1.35)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Diversification</label>
      <select id="diversifyStrength">
        <option value="0">Off — ignore past exposure</option>
        <option value="0.3">Light</option>
        <option value="0.5" selected>Medium (recommended)</option>
        <option value="0.8">Heavy — avoid repeat picks</option>
      </select>
    </div>

    <button class="btn-full btn-primary" id="saveSettings">Save Settings</button>
    <button class="btn-full btn-danger" id="resetDraft">Reset Draft (clear all picks)</button>
  </div>
</div>

<script src="/static/recommender.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────────
let PLAYERS = [];
let exposure = {};

// Draft state — stored in sessionStorage so it survives tab switches
const STATE_KEY = 'bba_live_draft';
let state = loadState();

function defaultState() {
  return {
    overallPick: 1,        // current overall pick number in the draft
    myTeam: [],            // players I drafted: [{id, name, pos, team, adp, pick, round, ...}]
    takenIds: new Set(),   // all drafted player ids (me + opponents)
    takenList: [],         // [{id, mine: bool, pick}] for undo
  };
}

function loadState() {
  try {
    const raw = sessionStorage.getItem(STATE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    s.takenIds = new Set(s.takenIds || []);
    return s;
  } catch { return defaultState(); }
}

function saveState() {
  const s = { ...state, takenIds: [...state.takenIds] };
  sessionStorage.setItem(STATE_KEY, JSON.stringify(s));
}

// Settings (persistent across sessions)
const SETTINGS_KEY = 'bba_settings';
let settings = loadSettings();

function defaultSettings() {
  return { myPosition: 1, numTeams: 12, stackIntensity: 'medium', rbPriority: 'strong', diversifyStrength: 0.5 };
}
function loadSettings() {
  try { return { ...defaultSettings(), ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; } catch { return defaultSettings(); }
}
function saveSettings() {
  settings.myPosition       = parseInt(document.getElementById('myPosition').value) || 1;
  settings.numTeams         = parseInt(document.getElementById('numTeams').value) || 12;
  settings.stackIntensity   = document.getElementById('stackIntensity').value;
  settings.rbPriority       = document.getElementById('rbPriority').value;
  settings.diversifyStrength = parseFloat(document.getElementById('diversifyStrength').value);
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}

// ── UI: Tab switching ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab, .tab-panel').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'recs')    renderRecs();
    if (tab.dataset.tab === 'roster')  renderRoster();
    if (tab.dataset.tab === 'picks')   renderPlayerList();
    if (tab.dataset.tab === 'settings') populateSettings();
  });
});

// ── Settings UI ───────────────────────────────────────────────────────────────
function populateSettings() {
  document.getElementById('myPosition').value       = settings.myPosition;
  document.getElementById('numTeams').value         = settings.numTeams;
  document.getElementById('stackIntensity').value   = settings.stackIntensity;
  document.getElementById('rbPriority').value       = settings.rbPriority;
  document.getElementById('diversifyStrength').value = settings.diversifyStrength;
}

document.getElementById('saveSettings').addEventListener('click', () => {
  saveSettings();
  document.getElementById('saveSettings').textContent = '✓ Saved';
  setTimeout(() => document.getElementById('saveSettings').textContent = 'Save Settings', 1500);
  renderHeader();
  renderRecs();
});

document.getElementById('resetDraft').addEventListener('click', () => {
  if (!confirm('Reset all draft picks?')) return;
  state = defaultState();
  saveState();
  selectedPlayer = null;
  hideActionBar();
  renderAll();
});

// ── Player loading ─────────────────────────────────────────────────────────────
async function loadPlayers() {
  try {
    const [playersResp, expResp] = await Promise.all([
      fetch('/api/players'),
      fetch('/api/drafts/exposure'),
    ]);
    PLAYERS = await playersResp.json();
    const expData = await expResp.json();
    exposure = expData.players || {};
    renderPlayerList();
    renderRecs();
  } catch (e) {
    document.getElementById('playerList').innerHTML =
      '<div class="spinner" style="color:#ef5350">Failed to load players. Is the server running?</div>';
  }
}

// ── Player list rendering ──────────────────────────────────────────────────────
let searchQuery = '';
let posFilter = 'ALL';
let selectedPlayer = null;

function getVisiblePlayers() {
  let list = PLAYERS;
  if (posFilter !== 'ALL') list = list.filter(p => p.pos === posFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
  }
  // Sort: available first by ADP, then taken (greyed out)
  const avail = list.filter(p => !state.takenIds.has(p.id));
  const taken = list.filter(p => state.takenIds.has(p.id));
  return [...avail, ...taken].slice(0, 80);
}

function renderPlayerList() {
  const players = getVisiblePlayers();
  const ul = document.getElementById('playerList');
  if (!players.length) {
    ul.innerHTML = '<div class="spinner">No players found</div>';
    return;
  }
  ul.innerHTML = players.map(p => {
    const isTaken = state.takenIds.has(p.id);
    const isMine = state.myTeam.some(t => t.id === p.id);
    const isSelected = selectedPlayer?.id === p.id;
    const takenHtml = isTaken
      ? `<span class="taken-by ${isMine ? 'mine' : 'opp'}">${isMine ? 'Mine' : 'Taken'}</span>`
      : '';
    return `
      <div class="player-row ${isTaken ? 'taken' : ''} ${isSelected ? 'selected' : ''}"
           data-id="${p.id}" data-pos="${p.pos}" onclick="selectPlayer('${p.id}')">
        <div class="adp-badge">${p.adp}</div>
        <div style="flex:1">
          <div class="p-name">${p.name}</div>
          <div class="p-meta">${p.pos} · ${p.team}${p.bye ? ' · bye ' + p.bye : ''}</div>
        </div>
        ${takenHtml}
      </div>`;
  }).join('');
}

// ── Player selection & actions ────────────────────────────────────────────────
function selectPlayer(id) {
  const player = PLAYERS.find(p => p.id === id);
  if (!player) return;
  if (state.takenIds.has(id)) return; // already drafted, ignore tap

  if (selectedPlayer?.id === id) {
    // Deselect
    selectedPlayer = null;
    hideActionBar();
  } else {
    selectedPlayer = player;
    showActionBar(player);
  }
  renderPlayerList();
}

function showActionBar(player) {
  document.getElementById('actionBar').classList.add('visible');
  document.getElementById('btnMyPick').textContent = `✓ My Pick: ${player.name.split(' ').pop()}`;
}
function hideActionBar() {
  document.getElementById('actionBar').classList.remove('visible');
  selectedPlayer = null;
}

document.getElementById('btnMyPick').addEventListener('click', () => {
  if (!selectedPlayer) return;
  addPick(selectedPlayer, true);
});
document.getElementById('btnOppPick').addEventListener('click', () => {
  if (!selectedPlayer) return;
  addPick(selectedPlayer, false);
});
document.getElementById('btnCancel').addEventListener('click', hideActionBar);

function addPick(player, isMine) {
  const pickNum = state.overallPick;
  const round   = Math.floor((pickNum - 1) / settings.numTeams) + 1;

  state.takenIds.add(player.id);
  state.takenList.push({ id: player.id, mine: isMine, pick: pickNum });

  if (isMine) {
    state.myTeam.push({ ...player, pick: pickNum, round });
  }

  state.overallPick++;
  saveState();

  selectedPlayer = null;
  hideActionBar();
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderAll();

  // Auto-switch to Recs tab after my pick
  if (isMine) switchTab('recs');
}

function undoLastPick() {
  if (!state.takenList.length) return;
  const last = state.takenList.pop();
  state.takenIds.delete(last.id);
  if (last.mine) {
    state.myTeam = state.myTeam.filter(p => p.pick !== last.pick);
  }
  state.overallPick = Math.max(1, state.overallPick - 1);
  saveState();
  renderAll();
}

function switchTab(name) {
  document.querySelectorAll('.tab, .tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

// ── Search & filter ───────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderPlayerList();
});

document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    posFilter = btn.dataset.pos;
    renderPlayerList();
  });
});

// ── Header ────────────────────────────────────────────────────────────────────
function renderHeader() {
  const pick  = state.overallPick;
  const round = Math.floor((pick - 1) / settings.numTeams) + 1;
  document.getElementById('hdrPick').textContent  = pick;
  document.getElementById('hdrRound').textContent = round;
  document.getElementById('pickNum').textContent  = pick;
  document.getElementById('roundNum').textContent = round;

  const myTurn = isMyTurn(pick, settings.numTeams, settings.myPosition);
  const badge  = document.getElementById('turnBadge');
  if (myTurn) {
    badge.className = 'my-turn-badge';
    badge.textContent = 'YOUR PICK';
  } else {
    const wait = picksUntilMyTurn(pick, settings.numTeams, settings.myPosition);
    badge.className = 'not-turn-badge';
    badge.textContent = wait === 0 ? '—' : `${wait} picks away`;
  }
}

// ── Recommendations ───────────────────────────────────────────────────────────
function renderRecs() {
  if (!PLAYERS.length) return;

  renderHeader();

  const available = PLAYERS.filter(p => !state.takenIds.has(p.id));
  const myTurn    = isMyTurn(state.overallPick, settings.numTeams, settings.myPosition);

  // Compute what overall pick number to use for recommendations.
  // If it's my turn, use current pick. Otherwise, look ahead to my next pick.
  let pickForRec = state.overallPick;
  if (!myTurn) {
    pickForRec = nextMyOverallPick(state.overallPick, settings.numTeams, settings.myPosition) || state.overallPick;
  }

  const recs = getTopRecommendations(
    available,
    state.myTeam,
    pickForRec,
    settings.stackIntensity,
    exposure,
    settings.diversifyStrength,
    5,
    settings.rbPriority
  );

  const el = document.getElementById('recsList');
  if (!recs.length) {
    el.innerHTML = '<div class="no-recs">Draft complete or no players available.</div>';
    return;
  }

  el.innerHTML = recs.map((r, i) => {
    const p = r.player;
    return `
      <div class="rec-card">
        <div class="rec-rank">#${i + 1}</div>
        <div>
          <span class="rec-pos ${p.pos}">${p.pos}</span>
          <span class="rec-name" style="display:inline">${p.name}</span>
        </div>
        <div class="rec-adp">${p.team}${p.bye ? ' · bye ' + p.bye : ''} · ADP ${p.adp}</div>
        ${r.reason ? `<div class="rec-reason">${r.reason}</div>` : ''}
        <button class="rec-pick-btn" onclick="quickPick('${p.id}')">Draft (My Pick)</button>
      </div>`;
  }).join('');
}

function quickPick(id) {
  const player = PLAYERS.find(p => p.id === id);
  if (!player) return;
  addPick(player, true);
}

// ── Roster ─────────────────────────────────────────────────────────────────────
function renderRoster() {
  const needs = getTeamNeeds(state.myTeam);
  const el = document.getElementById('needsRow');
  el.innerHTML = ['QB', 'RB', 'WR', 'TE'].map(pos => {
    const have = state.myTeam.filter(p => p.pos === pos).length;
    const targets = { QB: 2, RB: 6, WR: 8, TE: 2 };
    const target  = targets[pos];
    const color   = have >= target ? 'var(--green)' : have > 0 ? 'var(--accent)' : 'var(--muted)';
    return `
      <div class="need-box">
        <div class="need-pos">${pos}</div>
        <div class="need-val" style="color:${color}">${have}<span style="color:var(--muted);font-size:0.7em">/${target}</span></div>
      </div>`;
  }).join('');

  // Stacks summary
  const stacks = getStackSummary(state.myTeam);
  const stackEl = document.getElementById('stackSummary');
  if (stacks.length) {
    stackEl.innerHTML = '<div class="pos-header" style="margin-bottom:6px">Stacks</div>' +
      stacks.map(s => `<div class="stack-chip">🔗 ${s.team} · ${s.positions} (${s.count})</div>`).join('');
  } else {
    stackEl.innerHTML = '';
  }

  // Roster by position
  const rosterEl = document.getElementById('rosterDisplay');
  const byPos = { QB: [], RB: [], WR: [], TE: [] };
  state.myTeam.forEach(p => { if (byPos[p.pos]) byPos[p.pos].push(p); });

  rosterEl.innerHTML = Object.entries(byPos).map(([pos, players]) => {
    if (!players.length) return '';
    const chips = players.map(p =>
      `<div class="roster-chip ${pos}">
        <span>${p.name}</span>
        <span class="rnd">Rd${p.round}</span>
      </div>`
    ).join('');
    return `<div class="roster-pos-section">
      <div class="pos-header">${pos} (${players.length})</div>
      ${chips}
    </div>`;
  }).join('');

  if (!state.myTeam.length) {
    rosterEl.innerHTML = '<div class="no-recs">No picks yet</div>';
  }
}

// ── Render all ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  const activeTab = document.querySelector('.tab.active')?.dataset.tab;
  if (activeTab === 'picks')   renderPlayerList();
  if (activeTab === 'recs')    renderRecs();
  if (activeTab === 'roster')  renderRoster();
}

// ── Init ───────────────────────────────────────────────────────────────────────
populateSettings();
renderHeader();
loadPlayers();
</script>

</body>
</html>
