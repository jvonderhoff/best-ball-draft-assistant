<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Live Draft — Best Ball Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #0b0f14;
      --panel:  #111827;
      --card:   #1a2233;
      --border: #2a3f5f;
      --accent: #4fc3f7;
      --green:  #81c784;
      --red:    #ef5350;
      --orange: #ff9800;
      --text:   #e0e0e0;
      --muted:  #78909c;
      --QB:     #e91e63;
      --RB:     #2196f3;
      --WR:     #4caf50;
      --TE:     #ff9800;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    .hdr {
      background: #0d1520;
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hdr-title { font-weight: 700; font-size: 1em; color: var(--accent); }
    .hdr-meta  { font-size: 0.78em; color: var(--muted); text-align: right; }
    .hdr-meta span { color: var(--text); font-weight: 600; }

    /* ── Sync bar ── */
    .sync-bar {
      padding: 7px 14px;
      font-size: 0.78em;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: #0d1520;
    }
    .sync-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .sync-dot.live   { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .sync-dot.manual { background: var(--orange); }
    .sync-label { color: var(--muted); flex: 1; }
    .sync-label b { color: var(--text); }
    .sync-input-row {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .sync-input-row input {
      width: 130px;
      padding: 4px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.85em;
    }
    .sync-btn {
      padding: 4px 10px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 0.82em;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .sync-btn.disconnect {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: #0d1520;
      position: sticky;
      top: 82px;
      z-index: 99;
    }
    .tab {
      flex: 1;
      padding: 9px 4px;
      text-align: center;
      font-size: 0.78em;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-panel { display: none; padding: 12px; }
    .tab-panel.active { display: block; }

    /* ── Pick banner ── */
    .pick-banner {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .pick-banner .big { font-size: 1.2em; font-weight: 700; color: var(--accent); }
    .pick-banner .lbl { font-size: 0.72em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .my-turn-badge  { background: var(--green); color: #000; font-size: 0.75em; font-weight: 700; padding: 3px 10px; border-radius: 12px; }
    .not-turn-badge { background: #1a2233; color: var(--muted); font-size: 0.75em; padding: 3px 10px; border-radius: 12px; }

    /* ── Rec cards ── */
    .rec-card {
      background: var(--card);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid var(--accent);
      position: relative;
    }
    .rec-card:first-child { border-left-color: var(--green); }
    .rec-rank { position: absolute; top: 8px; right: 10px; font-size: 0.72em; color: var(--muted); font-weight: 700; }
    .rec-name { font-weight: 700; font-size: 1em; margin-bottom: 3px; }
    .rec-pos  { display: inline-block; font-size: 0.72em; font-weight: 700; padding: 1px 6px; border-radius: 3px; color: #fff; margin-right: 4px; }
    .rec-pos.QB { background: var(--QB); } .rec-pos.RB { background: var(--RB); }
    .rec-pos.WR { background: var(--WR); } .rec-pos.TE { background: var(--TE); }
    .rec-adp  { font-size: 0.78em; color: var(--muted); }
    .rec-reason { font-size: 0.78em; color: #90a4ae; margin-top: 5px; }
    .rec-pick-btn {
      margin-top: 8px; padding: 6px 12px;
      background: var(--accent); color: #000;
      border: none; border-radius: 5px;
      font-size: 0.82em; font-weight: 700; cursor: pointer;
    }
    .no-recs { text-align: center; color: var(--muted); padding: 40px 0; font-style: italic; }

    /* ── Picks tab ── */
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-wrap input {
      width: 100%; padding: 10px 12px 10px 36px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.95em;
    }
    .search-wrap input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .pos-filters { display: flex; gap: 6px; margin-bottom: 10px; }
    .pos-btn {
      padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); font-size: 0.78em; font-weight: 700; cursor: pointer;
    }
    .pos-btn.active { color: #fff; border-color: transparent; }
    .pos-btn[data-pos="ALL"].active { background: var(--accent); color: #000; }
    .pos-btn[data-pos="QB"].active  { background: var(--QB); }
    .pos-btn[data-pos="RB"].active  { background: var(--RB); }
    .pos-btn[data-pos="WR"].active  { background: var(--WR); }
    .pos-btn[data-pos="TE"].active  { background: var(--TE); }

    .action-bar { display: none; gap: 8px; margin-bottom: 10px; }
    .action-bar.visible { display: flex; }
    .action-bar button { flex: 1; padding: 11px; border-radius: 8px; border: none; font-size: 0.9em; font-weight: 700; cursor: pointer; }
    .btn-mine { background: var(--accent); color: #000; }
    .btn-opp  { background: var(--border); color: var(--text); }
    .btn-undo { background: transparent; border: 1px solid var(--border) !important; color: var(--muted); flex: 0 0 44px; }
    button:active { opacity: 0.7; }

    .player-list { display: flex; flex-direction: column; gap: 4px; max-height: 45vh; overflow-y: auto; }
    .player-row {
      display: flex; align-items: center; background: var(--card);
      border-radius: 6px; padding: 8px 10px; gap: 10px;
      border-left: 3px solid transparent; cursor: pointer; user-select: none;
    }
    .player-row:active { background: #1e2d44; }
    .player-row.taken    { opacity: 0.32; }
    .player-row.selected { background: #1a2d4d; border-left-color: var(--accent); }
    .player-row[data-pos="QB"] { border-left-color: var(--QB); }
    .player-row[data-pos="RB"] { border-left-color: var(--RB); }
    .player-row[data-pos="WR"] { border-left-color: var(--WR); }
    .player-row[data-pos="TE"] { border-left-color: var(--TE); }
    .player-row.taken[data-pos] { border-left-color: transparent; }
    .adp-badge { min-width: 32px; text-align: center; font-size: 0.72em; color: var(--muted); font-weight: 700; }
    .p-name { flex: 1; font-weight: 600; font-size: 0.88em; }
    .p-meta { font-size: 0.75em; color: var(--muted); }
    .taken-by { font-size: 0.7em; font-weight: 700; padding: 2px 6px; border-radius: 10px; }
    .taken-by.mine { background: #1a3a4d; color: var(--accent); }
    .taken-by.opp  { background: #2d1a1a; color: var(--muted); }

    /* ── Roster ── */
    .needs-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .need-box { flex: 1; background: var(--card); border-radius: 6px; padding: 8px; text-align: center; }
    .need-box .need-pos { font-size: 0.65em; font-weight: 700; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; }
    .need-box .need-val { font-size: 1.1em; font-weight: 700; margin-top: 2px; }
    .roster-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--card); border-radius: 6px; padding: 6px 10px;
      margin: 3px 3px 3px 0; font-size: 0.82em; border-left: 3px solid transparent;
    }
    .roster-chip.QB { border-left-color: var(--QB); } .roster-chip.RB { border-left-color: var(--RB); }
    .roster-chip.WR { border-left-color: var(--WR); } .roster-chip.TE { border-left-color: var(--TE); }
    .roster-chip .rnd { font-size: 0.75em; color: var(--muted); }
    .pos-header { font-size: 0.7em; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .stack-chip { display: inline-flex; align-items: center; gap: 6px; background: #1a2d4d; border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; margin: 3px 3px 0 0; font-size: 0.78em; }

    /* ── Settings ── */
    .settings-grid { display: flex; flex-direction: column; gap: 14px; }
    .setting-group label { display: block; font-size: 0.75em; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .setting-group select, .setting-group input[type=number] {
      width: 100%; padding: 9px 10px; background: var(--card);
      border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.95em;
    }
    .settings-hint { font-size: 0.78em; color: var(--muted); margin-top: 4px; }
    .btn-full { display: block; width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 0.95em; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-danger  { background: transparent; border: 1px solid var(--red) !important; color: var(--red); }

    .spinner { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9em; }

    /* Live-update flash */
    @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
    .live-flash { animation: flash 0.4s ease; }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-title">🏈 Live Draft</div>
  <div class="hdr-meta">
    Pick <span id="hdrPick">—</span> &nbsp;·&nbsp; Rd <span id="hdrRound">—</span>
  </div>
</div>

<!-- ── Sync bar ── -->
<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <div class="sync-label" id="syncLabel">Not connected</div>
  <div class="sync-input-row" id="syncInputRow">
    <input type="text" id="draftIdInput" placeholder="DK draft ID" inputmode="numeric">
    <button class="sync-btn" id="connectBtn">Connect</button>
  </div>
  <button class="sync-btn disconnect" id="disconnectBtn" style="display:none">Disconnect</button>
</div>

<div class="tabs">
  <div class="tab active" data-tab="recs">Recs</div>
  <div class="tab" data-tab="picks">Draft</div>
  <div class="tab" data-tab="roster">Roster</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- ── Recs Tab ── -->
<div id="tab-recs" class="tab-panel active">
  <div class="pick-banner">
    <div><div class="lbl">Overall Pick</div><div class="big" id="pickNum">—</div></div>
    <div><div class="lbl">Round</div><div class="big" id="roundNum">—</div></div>
    <div id="turnBadge" class="not-turn-badge">—</div>
  </div>
  <div id="recsList"><div class="no-recs">Connect to your draft or add picks manually below.</div></div>
</div>

<!-- ── Picks Tab ── -->
<div id="tab-picks" class="tab-panel">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search player name or team…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="pos-filters">
    <button class="pos-btn active" data-pos="ALL">ALL</button>
    <button class="pos-btn" data-pos="QB">QB</button>
    <button class="pos-btn" data-pos="RB">RB</button>
    <button class="pos-btn" data-pos="WR">WR</button>
    <button class="pos-btn" data-pos="TE">TE</button>
  </div>
  <div class="action-bar" id="actionBar">
    <button class="btn-mine" id="btnMyPick">✓ My Pick</button>
    <button class="btn-opp"  id="btnOppPick">→ Opponent</button>
    <button class="btn-undo" id="btnCancel" title="Cancel">✕</button>
  </div>
  <div class="player-list" id="playerList"><div class="spinner">Loading players…</div></div>
</div>

<!-- ── Roster Tab ── -->
<div id="tab-roster" class="tab-panel">
  <div class="needs-row" id="needsRow"></div>
  <div id="stackSummary"></div>
  <div id="rosterDisplay" style="margin-top:12px;"></div>
</div>

<!-- ── Settings Tab ── -->
<div id="tab-settings" class="tab-panel">
  <div class="settings-grid">
    <div class="setting-group">
      <label>My Draft Position (1–12)</label>
      <input type="number" id="myPosition" min="1" max="12" value="1">
      <div class="settings-hint">Auto-detected from the extension when connected.</div>
    </div>
    <div class="setting-group">
      <label>Number of Teams</label>
      <input type="number" id="numTeams" min="8" max="16" value="12">
    </div>
    <div class="setting-group">
      <label>Stack Intensity</label>
      <select id="stackIntensity">
        <option value="off">Off — pure ADP/positional value</option>
        <option value="light">Light — small nudge toward stackmates</option>
        <option value="medium" selected>Medium — balanced (recommended)</option>
        <option value="heavy">Heavy — aggressively stack your QB</option>
      </select>
    </div>
    <div class="setting-group">
      <label>RB Priority (early rounds)</label>
      <select id="rbPriority">
        <option value="off">Off — RBs compete on ADP only</option>
        <option value="mild">Mild — slight boost (×1.10)</option>
        <option value="strong" selected>Strong — target 2 RBs in rounds 1–3 (×1.20)</option>
        <option value="extreme">Extreme — RB heavy (×1.35)</option>
      </select>
    </div>
    <div class="setting-group">
      <label>Diversification</label>
      <select id="diversifyStrength">
        <option value="0">Off — ignore past exposure</option>
        <option value="0.3">Light</option>
        <option value="0.5" selected>Medium (recommended)</option>
        <option value="0.8">Heavy — avoid repeat picks</option>
      </select>
    </div>
    <button class="btn-full btn-primary" id="saveSettings">Save Settings</button>
    <button class="btn-full btn-danger"  id="resetDraft">Reset Draft (clear all picks)</button>
  </div>
</div>

<script src="/static/recommender.js"></script>
<script>
// ── Draft state ────────────────────────────────────────────────────────────────
let PLAYERS = [];
let exposure = {};

const STATE_KEY = 'bba_live_draft';
let state = loadState();

function defaultState() {
  return {
    overallPick: 1,
    myTeam:   [],           // [{id,name,pos,team,adp,pick,round}]
    takenIds: new Set(),    // all taken (me + opp)
    takenList: [],          // [{id, mine, pick}] — for manual undo
  };
}

function loadState() {
  try {
    const raw = sessionStorage.getItem(STATE_KEY);
    if (!raw) return defaultState();
    const s = JSON.parse(raw);
    s.takenIds = new Set(s.takenIds || []);
    return s;
  } catch { return defaultState(); }
}

function saveState() {
  sessionStorage.setItem(STATE_KEY, JSON.stringify({ ...state, takenIds: [...state.takenIds] }));
}

// ── Settings ───────────────────────────────────────────────────────────────────
const SETTINGS_KEY = 'bba_settings';
let settings = loadSettings();

function defaultSettings() {
  return { myPosition: 1, numTeams: 12, stackIntensity: 'medium', rbPriority: 'strong', diversifyStrength: 0.5 };
}
function loadSettings() {
  try { return { ...defaultSettings(), ...JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}') }; }
  catch { return defaultSettings(); }
}
function persistSettings() {
  settings.myPosition        = parseInt(document.getElementById('myPosition').value) || 1;
  settings.numTeams          = parseInt(document.getElementById('numTeams').value) || 12;
  settings.stackIntensity    = document.getElementById('stackIntensity').value;
  settings.rbPriority        = document.getElementById('rbPriority').value;
  settings.diversifyStrength = parseFloat(document.getElementById('diversifyStrength').value);
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
}
function populateSettings() {
  document.getElementById('myPosition').value        = settings.myPosition;
  document.getElementById('numTeams').value          = settings.numTeams;
  document.getElementById('stackIntensity').value    = settings.stackIntensity;
  document.getElementById('rbPriority').value        = settings.rbPriority;
  document.getElementById('diversifyStrength').value = settings.diversifyStrength;
}

// ── Live sync ──────────────────────────────────────────────────────────────────
let syncDraftId   = localStorage.getItem('bba_sync_draft_id') || '';
let syncInterval  = null;
let lastSyncAge   = null;
let syncConnected = false;

// Restore connection on page load if we had one
if (syncDraftId) {
  document.getElementById('draftIdInput').value = syncDraftId;
  startSync(syncDraftId);
}

function startSync(draftId) {
  syncDraftId = draftId.trim();
  if (!syncDraftId) return;
  localStorage.setItem('bba_sync_draft_id', syncDraftId);
  if (syncInterval) clearInterval(syncInterval);
  pollSync();                                // immediate first poll
  syncInterval = setInterval(pollSync, 3000); // then every 3 s
  document.getElementById('syncInputRow').style.display  = 'none';
  document.getElementById('disconnectBtn').style.display = '';
}

function stopSync() {
  if (syncInterval) { clearInterval(syncInterval); syncInterval = null; }
  syncDraftId = '';
  localStorage.removeItem('bba_sync_draft_id');
  syncConnected = false;
  document.getElementById('syncInputRow').style.display  = '';
  document.getElementById('disconnectBtn').style.display = 'none';
  document.getElementById('draftIdInput').value = '';
  updateSyncUI(false, 'Not connected');
}

async function pollSync() {
  if (!syncDraftId) return;
  try {
    const r = await fetch(`/api/live-draft/state?draft_id=${encodeURIComponent(syncDraftId)}`);
    const data = await r.json();
    applyLiveState(data);
  } catch {
    updateSyncUI(false, 'Server unreachable');
  }
}

function applyLiveState(data) {
  if (!data.connected) {
    updateSyncUI(false, data.age_seconds != null
      ? `Last seen ${data.age_seconds}s ago — open DK on desktop`
      : 'Waiting for desktop extension…');
    return;
  }

  const age = data.age_seconds || 0;
  updateSyncUI(true, `Live · pick ${data.overall_pick} · ${age}s ago`);

  // Auto-update pick number
  if (data.overall_pick && data.overall_pick !== state.overallPick) {
    state.overallPick = data.overall_pick;
  }

  // Auto-update draft position if extension detected it
  if (data.my_position && data.my_position !== settings.myPosition) {
    settings.myPosition = data.my_position;
    document.getElementById('myPosition').value = data.my_position;
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
  }

  // Sync taken players
  let changed = false;
  const remoteTakenSet = new Set(data.taken_ids || []);

  // Add newly taken players
  for (const id of remoteTakenSet) {
    if (!state.takenIds.has(id)) {
      state.takenIds.add(id);
      changed = true;
    }
  }

  // Sync my team from extension (authoritative)
  const remoteMyTeam = data.my_team || [];
  const remoteMyIds  = new Set(remoteMyTeam.map(p => p.id));
  const localMyIds   = new Set(state.myTeam.map(p => p.id));

  for (const p of remoteMyTeam) {
    if (!localMyIds.has(p.id)) {
      state.myTeam.push(p);
      state.takenIds.add(p.id);
      changed = true;
    }
  }
  // Remove picks that were undone on desktop
  if (state.myTeam.length !== remoteMyTeam.length) {
    state.myTeam = state.myTeam.filter(p => remoteMyIds.has(p.id));
    changed = true;
  }

  if (changed) {
    saveState();
    renderAll();
    // Flash the recs panel to signal an update
    document.getElementById('recsList').classList.add('live-flash');
    setTimeout(() => document.getElementById('recsList').classList.remove('live-flash'), 400);
  } else {
    // Still re-render header even if picks unchanged (pick counter updated)
    renderHeader();
  }
}

function updateSyncUI(connected, labelText) {
  syncConnected = connected;
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + (connected ? 'live' : syncDraftId ? 'manual' : '');
  lbl.innerHTML = labelText;
}

document.getElementById('connectBtn').addEventListener('click', () => {
  const val = document.getElementById('draftIdInput').value.trim();
  if (!val) return;
  startSync(val);
});
document.getElementById('draftIdInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('connectBtn').click();
});
document.getElementById('disconnectBtn').addEventListener('click', stopSync);

// ── Tab switching ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab, .tab-panel').forEach(el => el.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    const t = tab.dataset.tab;
    if (t === 'recs')     renderRecs();
    if (t === 'roster')   renderRoster();
    if (t === 'picks')    renderPlayerList();
    if (t === 'settings') populateSettings();
  });
});

// ── Settings events ────────────────────────────────────────────────────────────
document.getElementById('saveSettings').addEventListener('click', () => {
  persistSettings();
  document.getElementById('saveSettings').textContent = '✓ Saved';
  setTimeout(() => document.getElementById('saveSettings').textContent = 'Save Settings', 1500);
  renderAll();
});
document.getElementById('resetDraft').addEventListener('click', () => {
  if (!confirm('Reset all draft picks?')) return;
  state = defaultState();
  saveState();
  selectedPlayer = null;
  hideActionBar();
  renderAll();
});

// ── Player loading ─────────────────────────────────────────────────────────────
async function loadPlayers() {
  try {
    const [pr, er] = await Promise.all([fetch('/api/players'), fetch('/api/drafts/exposure')]);
    PLAYERS  = await pr.json();
    exposure = (await er.json()).players || {};
    renderPlayerList();
    renderRecs();
  } catch {
    document.getElementById('playerList').innerHTML =
      '<div class="spinner" style="color:#ef5350">Failed to load players.</div>';
  }
}

// ── Player list ────────────────────────────────────────────────────────────────
let searchQuery = '', posFilter = 'ALL', selectedPlayer = null;

function getVisiblePlayers() {
  let list = PLAYERS;
  if (posFilter !== 'ALL') list = list.filter(p => p.pos === posFilter);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(p => p.name.toLowerCase().includes(q) || p.team.toLowerCase().includes(q));
  }
  const avail = list.filter(p => !state.takenIds.has(p.id));
  const taken = list.filter(p =>  state.takenIds.has(p.id));
  return [...avail, ...taken].slice(0, 80);
}

function renderPlayerList() {
  const players = getVisiblePlayers();
  const ul = document.getElementById('playerList');
  if (!players.length) { ul.innerHTML = '<div class="spinner">No players found</div>'; return; }
  ul.innerHTML = players.map(p => {
    const isTaken   = state.takenIds.has(p.id);
    const isMine    = state.myTeam.some(t => t.id === p.id);
    const isSelected = selectedPlayer?.id === p.id;
    const badge = isTaken
      ? `<span class="taken-by ${isMine ? 'mine' : 'opp'}">${isMine ? 'Mine' : 'Taken'}</span>` : '';
    return `<div class="player-row ${isTaken?'taken':''} ${isSelected?'selected':''}"
         data-id="${p.id}" data-pos="${p.pos}" onclick="selectPlayer('${p.id}')">
      <div class="adp-badge">${p.adp}</div>
      <div style="flex:1">
        <div class="p-name">${p.name}</div>
        <div class="p-meta">${p.pos} · ${p.team}${p.bye ? ' · bye '+p.bye : ''}</div>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function selectPlayer(id) {
  const p = PLAYERS.find(p => p.id === id);
  if (!p || state.takenIds.has(id)) return;
  selectedPlayer = selectedPlayer?.id === id ? null : p;
  if (selectedPlayer) showActionBar(selectedPlayer); else hideActionBar();
  renderPlayerList();
}
function showActionBar(p) {
  document.getElementById('actionBar').classList.add('visible');
  document.getElementById('btnMyPick').textContent = `✓ My Pick: ${p.name.split(' ').pop()}`;
}
function hideActionBar() {
  document.getElementById('actionBar').classList.remove('visible');
  selectedPlayer = null;
}

document.getElementById('btnMyPick').addEventListener('click',  () => { if (selectedPlayer) addPick(selectedPlayer, true); });
document.getElementById('btnOppPick').addEventListener('click', () => { if (selectedPlayer) addPick(selectedPlayer, false); });
document.getElementById('btnCancel').addEventListener('click', hideActionBar);

function addPick(player, isMine) {
  const pickNum = state.overallPick;
  const round   = Math.floor((pickNum - 1) / settings.numTeams) + 1;
  state.takenIds.add(player.id);
  state.takenList.push({ id: player.id, mine: isMine, pick: pickNum });
  if (isMine) state.myTeam.push({ ...player, pick: pickNum, round });
  state.overallPick++;
  saveState();
  selectedPlayer = null;
  hideActionBar();
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderAll();
  if (isMine) switchTab('recs');
}

function switchTab(name) {
  document.querySelectorAll('.tab, .tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelector(`.tab[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim(); renderPlayerList();
});
document.querySelectorAll('.pos-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pos-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    posFilter = btn.dataset.pos;
    renderPlayerList();
  });
});

// ── Header ─────────────────────────────────────────────────────────────────────
function renderHeader() {
  const pick  = state.overallPick;
  const round = Math.floor((pick - 1) / settings.numTeams) + 1;
  document.getElementById('hdrPick').textContent  = pick;
  document.getElementById('hdrRound').textContent = round;
  document.getElementById('pickNum').textContent  = pick;
  document.getElementById('roundNum').textContent = round;

  const myTurn = isMyTurn(pick, settings.numTeams, settings.myPosition);
  const badge  = document.getElementById('turnBadge');
  if (myTurn) {
    badge.className   = 'my-turn-badge';
    badge.textContent = 'YOUR PICK';
  } else {
    const wait = picksUntilMyTurn(pick, settings.numTeams, settings.myPosition);
    badge.className   = 'not-turn-badge';
    badge.textContent = wait > 0 ? `${wait} picks away` : '—';
  }
}

// ── Recommendations ────────────────────────────────────────────────────────────
function renderRecs() {
  if (!PLAYERS.length) return;
  renderHeader();

  const available = PLAYERS.filter(p => !state.takenIds.has(p.id));
  const myTurn    = isMyTurn(state.overallPick, settings.numTeams, settings.myPosition);
  const pickForRec = myTurn
    ? state.overallPick
    : (nextMyOverallPick(state.overallPick, settings.numTeams, settings.myPosition) || state.overallPick);

  const recs = getTopRecommendations(
    available, state.myTeam, pickForRec,
    settings.stackIntensity, exposure, settings.diversifyStrength,
    5, settings.rbPriority
  );

  const el = document.getElementById('recsList');
  if (!recs.length) { el.innerHTML = '<div class="no-recs">No players available.</div>'; return; }

  el.innerHTML = recs.map((r, i) => {
    const p = r.player;
    return `<div class="rec-card">
      <div class="rec-rank">#${i+1}</div>
      <div><span class="rec-pos ${p.pos}">${p.pos}</span><span class="rec-name" style="display:inline">${p.name}</span></div>
      <div class="rec-adp">${p.team}${p.bye?' · bye '+p.bye:''} · ADP ${p.adp}</div>
      ${r.reason ? `<div class="rec-reason">${r.reason}</div>` : ''}
      <button class="rec-pick-btn" onclick="quickPick('${p.id}')">Draft (My Pick)</button>
    </div>`;
  }).join('');
}

function quickPick(id) {
  const p = PLAYERS.find(p => p.id === id);
  if (p) addPick(p, true);
}

// ── Roster ─────────────────────────────────────────────────────────────────────
function renderRoster() {
  const byPos = { QB: [], RB: [], WR: [], TE: [] };
  state.myTeam.forEach(p => { if (byPos[p.pos]) byPos[p.pos].push(p); });

  const targets = { QB: 2, RB: 6, WR: 8, TE: 2 };
  document.getElementById('needsRow').innerHTML = ['QB','RB','WR','TE'].map(pos => {
    const have = byPos[pos].length;
    const color = have >= targets[pos] ? 'var(--green)' : have > 0 ? 'var(--accent)' : 'var(--muted)';
    return `<div class="need-box">
      <div class="need-pos">${pos}</div>
      <div class="need-val" style="color:${color}">${have}<span style="color:var(--muted);font-size:0.7em">/${targets[pos]}</span></div>
    </div>`;
  }).join('');

  const stacks = getStackSummary(state.myTeam);
  document.getElementById('stackSummary').innerHTML = stacks.length
    ? '<div class="pos-header" style="margin-bottom:6px">Stacks</div>' +
      stacks.map(s => `<div class="stack-chip">🔗 ${s.team} · ${s.positions} (${s.count})</div>`).join('')
    : '';

  const rosterEl = document.getElementById('rosterDisplay');
  rosterEl.innerHTML = !state.myTeam.length ? '<div class="no-recs">No picks yet</div>'
    : Object.entries(byPos).map(([pos, players]) => players.length === 0 ? '' :
        `<div style="margin-bottom:14px">
          <div class="pos-header">${pos} (${players.length})</div>
          ${players.map(p => `<div class="roster-chip ${pos}"><span>${p.name}</span><span class="rnd">Rd${p.round||'?'}</span></div>`).join('')}
        </div>`
      ).join('');
}

// ── Render all ─────────────────────────────────────────────────────────────────
function renderAll() {
  renderHeader();
  const active = document.querySelector('.tab.active')?.dataset.tab;
  if (active === 'picks')  renderPlayerList();
  if (active === 'recs')   renderRecs();
  if (active === 'roster') renderRoster();
}

// ── Init ───────────────────────────────────────────────────────────────────────
populateSettings();
renderHeader();
loadPlayers();
</script>
</body>
</html>
