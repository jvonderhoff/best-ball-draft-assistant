<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Draft History — Best Ball Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/theme.css?v=3">
    <style>
        .history-container { max-width: 1100px; margin: 0 auto; }
        .exposure-section { margin-bottom: 30px; }
        .exposure-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        .exposure-card {
            background: var(--card-hi);
            border-radius: 6px;
            padding: 10px 12px;
            border-left: 3px solid var(--accent);
        }
        .exposure-card .exp-name { font-weight: 600; font-size: 0.88em; color: var(--text); }
        .exposure-card .exp-meta { font-size: 0.75em; color: var(--muted); margin-top: 2px; }
        .exp-bar-wrap { margin-top: 6px; background: var(--bg); border-radius: 3px; height: 5px; }
        .exp-bar { height: 5px; border-radius: 3px; background: var(--accent); transition: width 0.3s; }
        .exp-bar.high { background: var(--red); }
        .exp-bar.med  { background: var(--orange); }

        .draft-list { display: flex; flex-direction: column; gap: 12px; }
        .draft-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .draft-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-hi);
            padding: 12px 16px;
        }
        .draft-card-header h3 { font-size: 1em; color: var(--text); margin: 0; }
        .draft-meta { font-size: 0.8em; color: var(--muted); }
        .draft-proj { font-weight: 700; color: var(--green); font-size: 0.95em; }
        .delete-btn {
            background: none; border: 1px solid var(--border); color: var(--muted);
            border-radius: 4px; padding: 4px 10px; cursor: pointer; font-size: 0.78em;
        }
        .delete-btn:hover { background: var(--border); color: var(--text); }
        .sync-btn {
            background: var(--accent); border: none; color: #fff;
            border-radius: 6px; padding: 8px 16px; cursor: pointer;
            font-size: 0.85em; font-weight: 600; white-space: nowrap;
        }
        .sync-btn:hover { filter: brightness(1.1); }
        .sync-btn:disabled { opacity: 0.6; cursor: default; filter: none; }
        .sync-input {
            background: var(--card, #1a1a1a); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px; padding: 7px 10px;
            font-size: 0.82em; width: 230px; max-width: 50vw;
        }
        .sync-results {
            margin: 0 0 20px; border: 1px solid var(--border); border-radius: 8px;
            padding: 10px 14px; font-size: 0.82em;
        }
        .sync-results .sr-row {
            display: flex; gap: 10px; align-items: baseline;
            padding: 3px 0; border-bottom: 1px solid var(--border-soft, rgba(128,128,128,0.15));
        }
        .sync-results .sr-row:last-child { border-bottom: none; }
        .sync-results .sr-status { font-weight: 700; min-width: 88px; }
        .sr-imported { color: var(--green); }
        .sr-updated { color: var(--accent); }
        .sr-duplicate { color: var(--muted); }
        .sr-incomplete, .sr-no_picks, .sr-error { color: var(--red, #c0392b); }
        .sync-results .sr-id { font-variant-numeric: tabular-nums; color: var(--text); min-width: 92px; }
        .sync-results .sr-reason { color: var(--muted); flex: 1; }
        .draft-picks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 6px;
            padding: 12px;
        }
        .pick-chip {
            background: var(--card-hi);
            border-radius: 4px;
            padding: 6px 8px;
            font-size: 0.78em;
            border-left: 3px solid var(--accent);
        }
        .pick-chip .pick-name { font-weight: 600; color: var(--text); }
        .pick-chip .pick-meta { color: var(--muted); font-size: 0.85em; }
        .pos-QB { border-left-color: #e91e63; }
        .pos-RB { border-left-color: #2196f3; }
        .pos-WR { border-left-color: #4caf50; }
        .pos-TE { border-left-color: #ff9800; }
        .empty-history { color: var(--muted); text-align: center; padding: 40px; font-style: italic; }
        .section-title { font-size: 0.75em; font-weight: 700; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

        .exposure-toggle { cursor: pointer; user-select: none; }
        .exposure-toggle:hover h2 { color: var(--accent); }
        .exp-chev { display: inline-block; font-size: 0.8em; color: var(--muted); transition: transform 0.15s; }
        .exposure-section.open .exp-chev { transform: rotate(90deg); }

        /* Exposure board — your ranked players grouped by round */
        #exposureBoard { overflow-x: auto; padding-bottom: 6px; }
        .board-round { display: flex; align-items: stretch; gap: 8px; margin-bottom: 6px; width: max-content; }
        .board-round-head { min-width: 40px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; color: var(--muted); position: sticky; left: 0; background: var(--bg, var(--card)); z-index: 1; }
        .board-grid { display: grid; gap: 5px; }   /* columns set inline = one row per round */
        /* Square tiles, DraftKings-board style */
        .board-player { position: relative; height: 84px; border: 1px solid var(--border); border-left-width: 4px; border-radius: 5px; padding: 6px 7px; overflow: hidden; display: flex; flex-direction: column; }
        .board-player .bp-rank { position: absolute; top: 4px; right: 6px; font-size: 0.6rem; font-weight: 700; color: var(--muted); font-variant-numeric: tabular-nums; }
        .board-player .bp-name { color: var(--text); font-weight: 700; font-size: 0.72rem; line-height: 1.12; padding-right: 18px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .board-player .bp-bottom { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; gap: 4px; }
        .board-player .bp-meta { color: var(--muted); font-size: 0.58rem; white-space: nowrap; }
        .board-player .bp-exp { font-weight: 800; font-size: 0.82rem; line-height: 1; font-variant-numeric: tabular-nums; }
        .board-player .bp-fill { position: absolute; left: 0; bottom: 0; height: 3px; background: var(--green); }
        .board-player.target { border-style: dashed; }
        .board-player.target .bp-exp { color: var(--accent); }

        /* Collapsed saved-draft rows (click to expand roster) */
        .draft-row { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 6px; cursor: pointer; }
        .draft-row:hover { background: var(--border-soft, rgba(128,128,128,0.08)); }
        .draft-row .dr-date { font-variant-numeric: tabular-nums; color: var(--text); min-width: 92px; font-weight: 600; }
        .draft-row .dr-build { color: var(--muted); flex: 1; font-size: 0.9em; font-variant-numeric: tabular-nums; }
        .draft-row .dr-pick { color: var(--muted); font-size: 0.85em; }
        .draft-row .dr-chev { color: var(--muted); transition: transform 0.15s; font-size: 0.85em; }
        .draft-row.open .dr-chev { transform: rotate(90deg); }
        .draft-roster { display: none; margin: -2px 0 12px; padding: 0 2px; }
        .draft-roster.open { display: block; }

        /* Draft tendencies — archetypes, builds, round heatmap */
        .tend-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; }
        @media (max-width: 720px) { .tend-cols { grid-template-columns: 1fr; } }
        .arch-row { display: flex; align-items: center; gap: 9px; margin-bottom: 6px; font-size: 0.8rem; }
        .arch-label { min-width: 86px; color: var(--text); }
        .arch-track { flex: 1; height: 14px; background: var(--border-soft, rgba(128,128,128,0.12)); border-radius: 3px; overflow: hidden; }
        .arch-fill { height: 100%; background: var(--accent); border-radius: 3px; }
        .arch-count { color: var(--muted); font-variant-numeric: tabular-nums; min-width: 58px; text-align: right; }
        .arch-mods { color: var(--muted); font-size: 0.74rem; margin-top: 8px; }
        .build-row { display: flex; justify-content: space-between; gap: 12px; font-size: 0.78rem; padding: 3px 0; border-bottom: 1px solid var(--border-soft, rgba(128,128,128,0.1)); }
        .build-row:last-child { border-bottom: none; }
        .build-row .bc-build { color: var(--text); font-variant-numeric: tabular-nums; }
        .build-row .bc-count { color: var(--muted); white-space: nowrap; }
        .heatmap { border-collapse: collapse; font-size: 0.72rem; margin-top: 4px; }
        .heatmap th, .heatmap td { padding: 3px 7px; text-align: center; border: 1px solid var(--border); font-variant-numeric: tabular-nums; }
        .heatmap th { color: var(--muted); font-weight: 700; }
        .heatmap td.rd { color: var(--muted); font-weight: 700; }
        .heatmap td .hm-pct { position: relative; z-index: 1; }
        .stat-strip { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
        .stat-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; }
        .stat-card .sc-label { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); font-weight: 700; }
        .stat-card .sc-value { font-size: 1.05rem; font-weight: 800; color: var(--text); margin-top: 3px; font-variant-numeric: tabular-nums; }
        .stat-card .sc-sub { font-size: 0.66rem; color: var(--muted); margin-top: 2px; }
        /* Clickable tendency filters */
        .arch-row.clickable, .build-row, .arch-mod { cursor: pointer; }
        .arch-row.clickable:hover .arch-label, .build-row:hover .bc-build, .arch-mod:hover { color: var(--accent); }
        .arch-row.active .arch-label, .build-row.active .bc-build { color: var(--accent); font-weight: 800; }
        .arch-mod { display: inline; }
        .arch-mod.active { color: var(--accent); font-weight: 700; }
        .filter-pill { font-size: 0.78rem; color: var(--muted); }
        .filter-pill b { color: var(--accent); }
        .filter-pill .fp-clear { cursor: pointer; margin-left: 8px; color: var(--muted); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; font-size: 0.92em; }
        .filter-pill .fp-clear:hover { color: var(--text); border-color: var(--accent); }

        @media (max-width: 600px) {
            .history-container { padding: 12px !important; }
            .exposure-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .draft-picks-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); padding: 8px; }
            .draft-card-header { flex-wrap: wrap; gap: 8px; }
            .draft-card-header h3 { font-size: 0.9em; }
        }
    </style>
</head>
<body>
<nav>
  <a href="/recommend">Live Draft</a>
  <a href="/history" class="active">History</a>
  <a href="/rankings">Rankings</a>
  <a href="/analysis">Analysis</a>
  <a href="/setup">Setup</a>
  <button class="theme-toggle" onclick="toggleTheme()"><!-- label via CSS ::after --></button>
</nav>
    <div class="history-container" style="padding: 24px;">
        <div style="margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
            <div>
                <h1 style="color:var(--text);">Draft History</h1>
            </div>
            <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
                <span id="syncStatus" style="font-size:0.85em;color:var(--muted);"></span>
                <span id="totalDrafts" style="color:var(--muted);font-size:0.9em;"></span>
                <input id="syncIds" class="sync-input" placeholder="paste draft ID(s) or URL — optional"
                       title="Leave blank to import all completed drafts. Or paste specific draft IDs/URLs (comma or space separated) to pull those by ID." />
                <button id="syncBtn" class="sync-btn" onclick="syncFromDK()">Sync from DK</button>
            </div>
        </div>
        <div id="syncResults" class="sync-results" style="display:none;"></div>

        <!-- How You Draft — tendencies overview -->
        <div class="panel" id="tendPanel" style="margin-bottom: 20px;">
            <div class="panel-header"><h2>How You Draft</h2><span id="tendSubtitle" style="font-size:0.8em;color:var(--muted);"></span></div>
            <div style="padding: 14px;">
                <div class="tend-cols">
                    <div>
                        <div class="section-title">Build archetypes</div>
                        <div id="archetypeBars"></div>
                        <div class="section-title" style="margin-top:16px;">Exact builds</div>
                        <div id="buildCounts"></div>
                    </div>
                    <div>
                        <div class="section-title">Position by round (% of drafts)</div>
                        <div id="roundHeatmap"></div>
                    </div>
                </div>
                <div id="statStrip" class="stat-strip"></div>
            </div>
        </div>

        <!-- Exposure section (collapsed; click to view) -->
        <div class="exposure-section panel" style="margin-bottom: 20px;">
            <div class="panel-header exposure-toggle" id="exposureHeader" onclick="toggleExposure()">
                <h2><span class="exp-chev">▶</span> Player Exposure</h2>
                <span id="exposureSubtitle" style="font-size:0.8em;color:var(--muted);"></span>
            </div>
            <div id="exposureBody" style="padding: 14px; display: none;">
                <div class="section-title">Your board by round — % = exposure across drafts · dashed tile = not yet drafted</div>
                <div id="exposureBoard">
                    <p class="empty-history">No rankings or drafts yet</p>
                </div>
            </div>
        </div>

        <!-- Draft list -->
        <div class="panel">
            <div class="panel-header"><h2>Saved Drafts</h2><div id="filterPill"></div></div>
            <div style="padding: 14px;">
                <div id="draftList" class="draft-list">
                    <p class="empty-history">No drafts saved yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let _bd = { rankings: [], exposure: {}, drafts: [] };
        let _boardBuilt = false;
        let _filter = null; // { type: 'arch'|'build'|'mod', value: string }

        function setFilter(type, value) {
            if (_filter && _filter.type === type && _filter.value === value) {
                _filter = null;
            } else {
                _filter = { type, value };
            }
            applyFilter();
        }

        function clearFilter() { _filter = null; applyFilter(); }

        function applyFilter() {
            const drafts = _filter ? _bd.drafts.filter(d => {
                const { primary, mods } = classifyArchetype(d.picks);
                if (_filter.type === 'arch')  return primary === _filter.value;
                if (_filter.type === 'mod')   return mods.includes(_filter.value);
                if (_filter.type === 'build') return buildType(d.picks) === _filter.value;
                return true;
            }) : _bd.drafts;
            renderDrafts(drafts);
            const pill = document.getElementById('filterPill');
            if (!_filter) {
                pill.innerHTML = '';
            } else {
                pill.innerHTML = `<span class="filter-pill">Showing <b>${_filter.value}</b> — ${drafts.length} draft${drafts.length === 1 ? '' : 's'} <span class="fp-clear" onclick="clearFilter()">× clear</span></span>`;
            }
            document.querySelectorAll('[data-ftype]').forEach(el => el.classList.remove('active'));
            if (_filter) {
                document.querySelectorAll(`[data-ftype="${_filter.type}"]`).forEach(el => {
                    if (el.dataset.fval === _filter.value) el.classList.add('active');
                });
            }
        }

        async function load() {
            const [draftsResp, expResp, rankResp] = await Promise.all([
                fetch('/api/drafts'),
                fetch('/api/drafts/exposure'),
                fetch('/api/rankings'),
            ]);
            _bd.drafts = await draftsResp.json();
            _bd.exposure = await expResp.json();
            _bd.rankings = await rankResp.json();

            const total = _bd.exposure.total_drafts || 0;
            document.getElementById('totalDrafts').textContent = `${total} draft${total === 1 ? '' : 's'} saved`;
            document.getElementById('exposureSubtitle').textContent = total ? `across ${total} drafts · click to view` : 'click to view';

            _filter = null;
            renderDrafts(_bd.drafts);
            renderTendencies(_bd.drafts);

            // Rebuild the board only if the panel is currently open; otherwise defer until clicked.
            _boardBuilt = false;
            if (document.querySelector('.exposure-section')?.classList.contains('open')) buildBoard();
        }

        function toggleExposure() {
            const sec = document.querySelector('.exposure-section');
            const body = document.getElementById('exposureBody');
            const open = sec.classList.toggle('open');
            body.style.display = open ? 'block' : 'none';
            if (open && !_boardBuilt) buildBoard();
        }

        function buildBoard() {
            _boardBuilt = true;
            renderExposureBoard(_bd.rankings, _bd.exposure, _bd.drafts);
        }

        // ISO/date string -> YYYY-MM-DD (no timezone shift, no time)
        function ymd(s) { return (s || '').slice(0, 10) || '—'; }

        // Positional build like "2QB · 6RB · 9WR · 3TE"
        function buildType(picks) {
            const c = {};
            picks.forEach(p => { c[p.pos] = (c[p.pos] || 0) + 1; });
            return ['QB', 'RB', 'WR', 'TE'].filter(pos => c[pos]).map(pos => `${c[pos]}${pos}`).join(' · ');
        }

        // Classify a draft's early-round strategy. Returns { primary, mods[] }.
        function classifyArchetype(picks) {
            const inRounds = (a, b, pos) => picks.filter(p => p.round >= a && p.round <= b && p.pos === pos).length;
            const earlyRB = inRounds(1, 5, 'RB');
            const r12RB   = inRounds(1, 2, 'RB');
            let primary;
            if (earlyRB === 0)                       primary = 'Zero RB';
            else if (earlyRB >= 3)                   primary = 'Robust RB';
            else if (r12RB >= 1 && earlyRB === 1)    primary = 'Hero RB';
            else                                     primary = 'Balanced';
            const mods = [];
            if (inRounds(1, 3, 'TE') > 0) mods.push('Elite TE');
            if (inRounds(1, 5, 'QB') > 0) mods.push('Early QB');
            return { primary, mods };
        }

        const ARCH_ORDER = ['Zero RB', 'Hero RB', 'Balanced', 'Robust RB'];
        const POS_RGB = { QB: '233,30,99', RB: '33,150,243', WR: '76,175,80', TE: '255,152,0' };

        function renderTendencies(drafts) {
            const n = drafts.length;
            document.getElementById('tendSubtitle').textContent = n ? `${n} draft${n === 1 ? '' : 's'}` : '';
            const archBars = document.getElementById('archetypeBars');
            const buildBox = document.getElementById('buildCounts');
            const heatBox  = document.getElementById('roundHeatmap');

            if (!n) {
                archBars.innerHTML = buildBox.innerHTML = heatBox.innerHTML =
                    '<p class="empty-history" style="padding:14px;">Sync drafts to see your tendencies</p>';
                return;
            }

            // --- Archetype distribution ---
            const archCount = {}, modCount = {};
            const buildTally = {};
            drafts.forEach(d => {
                const { primary, mods } = classifyArchetype(d.picks);
                archCount[primary] = (archCount[primary] || 0) + 1;
                mods.forEach(m => modCount[m] = (modCount[m] || 0) + 1);
                const b = buildType(d.picks);
                buildTally[b] = (buildTally[b] || 0) + 1;
            });
            const maxArch = Math.max(...ARCH_ORDER.map(a => archCount[a] || 0), 1);
            archBars.innerHTML = ARCH_ORDER.map(a => {
                const c = archCount[a] || 0;
                const pct = Math.round((c / n) * 100);
                return `<div class="arch-row clickable" data-ftype="arch" data-fval="${a}" onclick="setFilter(this.dataset.ftype,this.dataset.fval)">
                    <span class="arch-label">${a}</span>
                    <span class="arch-track"><span class="arch-fill" style="width:${(c / maxArch) * 100}%"></span></span>
                    <span class="arch-count">${c} · ${pct}%</span>
                </div>`;
            }).join('') + (Object.keys(modCount).length
                ? `<div class="arch-mods">${Object.entries(modCount).map(([m, c]) =>
                    `<span class="arch-mod" data-ftype="mod" data-fval="${m}" onclick="setFilter(this.dataset.ftype,this.dataset.fval)">${m} in ${c}/${n}</span>`
                  ).join(' · ')}</div>`
                : '');

            // --- Exact builds ---
            buildBox.innerHTML = Object.entries(buildTally)
                .sort((a, b) => b[1] - a[1])
                .map(([b, c]) => `<div class="build-row" data-ftype="build" data-fval="${b}" onclick="setFilter(this.dataset.ftype,this.dataset.fval)"><span class="bc-build">${b}</span><span class="bc-count">${c}/${n}</span></div>`)
                .join('');

            // --- Position-by-round heatmap (one pick per round per draft) ---
            const posList = ['QB', 'RB', 'WR', 'TE'];
            const maxRound = Math.max(...drafts.flatMap(d => d.picks.map(p => p.round || 0)), 0);
            const matrix = {};
            for (let r = 1; r <= maxRound; r++) matrix[r] = { QB: 0, RB: 0, WR: 0, TE: 0 };
            drafts.forEach(d => d.picks.forEach(p => {
                if (matrix[p.round] && posList.includes(p.pos)) matrix[p.round][p.pos]++;
            }));
            let rows = '';
            for (let r = 1; r <= maxRound; r++) {
                const cells = posList.map(pos => {
                    const c = matrix[r][pos];
                    const pct = Math.round((c / n) * 100);
                    const alpha = (c / n) * 0.85;
                    const bg = c ? `background:rgba(${POS_RGB[pos]},${alpha.toFixed(2)});` : '';
                    return `<td style="${bg}"><span class="hm-pct">${pct ? pct + '%' : ''}</span></td>`;
                }).join('');
                rows += `<tr><td class="rd">R${r}</td>${cells}</tr>`;
            }
            heatBox.innerHTML = `<table class="heatmap">
                <thead><tr><th>Rd</th>${posList.map(p => `<th>${p}</th>`).join('')}</tr></thead>
                <tbody>${rows}</tbody></table>`;

            // --- Stat strip: timing, construction, stacks, anchor ---
            const firstRoundOf = (picks, pos) => {
                const rs = picks.filter(p => p.pos === pos).map(p => p.round);
                return rs.length ? Math.min(...rs) : null;
            };
            const avgFirst = pos => {
                const v = drafts.map(d => firstRoundOf(d.picks, pos)).filter(x => x != null);
                return v.length ? (v.reduce((a, b) => a + b, 0) / v.length) : null;
            };
            const fmtRound = v => v == null ? '—' : 'R' + v.toFixed(1);
            const avgPos = pos => drafts.reduce((s, d) => s + d.picks.filter(p => p.pos === pos).length, 0) / n;

            // QB stack = a QB sharing a team with a WR/TE you also drafted
            const stackCount = drafts.filter(d => {
                const pcTeams = new Set(d.picks.filter(p => ['WR', 'TE'].includes(p.pos) && p.team).map(p => p.team));
                return d.picks.some(p => p.pos === 'QB' && pcTeams.has(p.team));
            }).length;

            // Round-1 anchor: most common R1 position + most-drafted R1 player
            const r1 = drafts.map(d => d.picks.find(p => p.round === 1)).filter(Boolean);
            const r1pos = {}, r1players = {};
            r1.forEach(p => { r1pos[p.pos] = (r1pos[p.pos] || 0) + 1; r1players[p.player_name] = (r1players[p.player_name] || 0) + 1; });
            const topPos = Object.entries(r1pos).sort((a, b) => b[1] - a[1])[0];
            const topPlayer = Object.entries(r1players).sort((a, b) => b[1] - a[1])[0];

            const card = (label, value, sub) =>
                `<div class="stat-card"><div class="sc-label">${label}</div><div class="sc-value">${value}</div>${sub ? `<div class="sc-sub">${sub}</div>` : ''}</div>`;

            document.getElementById('statStrip').innerHTML = [
                card('First QB', fmtRound(avgFirst('QB')), 'avg round'),
                card('First RB', fmtRound(avgFirst('RB')), 'avg round'),
                card('First TE', fmtRound(avgFirst('TE')), 'avg round'),
                card('Avg roster', `${avgPos('QB').toFixed(1)}·${avgPos('RB').toFixed(1)}·${avgPos('WR').toFixed(1)}·${avgPos('TE').toFixed(1)}`, 'QB·RB·WR·TE'),
                card('QB stacks', `${stackCount}/${n}`, 'QB + own pass-catcher'),
                card('R1 anchor', topPos ? `${topPos[0]} ${Math.round(topPos[1] / n * 100)}%` : '—', topPlayer ? `top: ${topPlayer[0]} ×${topPlayer[1]}` : ''),
            ].join('');
        }

        function renderExposureBoard(rankings, exposure, drafts) {
            const total = exposure.total_drafts || 0;
            const board = document.getElementById('exposureBoard');
            const expMap = exposure.players || {};
            const teams = (drafts[0] && drafts[0].num_teams) || 12;

            // Ranked players only, in custom-rank order
            const ranked = (rankings || [])
                .filter(p => p.custom_rank != null)
                .sort((a, b) => a.custom_rank - b.custom_rank);

            if (!ranked.length) {
                board.innerHTML = '<p class="empty-history">Set your rankings to see the board</p>';
                return;
            }

            // Group into rounds of `teams`
            const rounds = {};
            ranked.forEach(p => {
                const rd = Math.ceil(p.custom_rank / teams);
                (rounds[rd] = rounds[rd] || []).push(p);
            });

            board.innerHTML = Object.keys(rounds).map(Number).sort((a, b) => a - b).map(rd => {
                const cells = rounds[rd].map(p => {
                    const e = expMap[p.player_id];
                    const times = e ? e.times_drafted : 0;
                    const pct = total ? Math.round((times / total) * 100) : 0;
                    const cls = pct === 0 ? 'target' : '';
                    return `
                        <div class="board-player pos-${p.pos} ${cls}" title="${p.name} — ${pct}% (${times}/${total})">
                            <span class="bp-rank">${p.custom_rank}</span>
                            <div class="bp-name">${p.name}</div>
                            <div class="bp-bottom">
                                <span class="bp-meta">${p.pos}·${p.team || 'FA'}</span>
                                <span class="bp-exp">${pct}%</span>
                            </div>
                            <div class="bp-fill" style="width:${pct}%"></div>
                        </div>`;
                }).join('');
                return `<div class="board-round">
                            <div class="board-round-head">R${rd}</div>
                            <div class="board-grid" style="grid-template-columns: repeat(${teams}, 88px)">${cells}</div>
                        </div>`;
            }).join('');
        }

        function renderDrafts(drafts) {
            const list = document.getElementById('draftList');
            if (!drafts.length) {
                list.innerHTML = '<p class="empty-history">No drafts saved yet</p>';
                return;
            }
            list.innerHTML = drafts.map(d => {
                const picks = [...d.picks].sort((a, b) => (a.pick_number || 0) - (b.pick_number || 0));
                const roster = picks.map(p => `
                    <div class="pick-chip pos-${p.pos}">
                        <div class="pick-name">${p.player_name}</div>
                        <div class="pick-meta">${p.pos} · ${p.team} · Pk ${p.pick_number}</div>
                    </div>`).join('');
                const fee = d.entry_fee != null ? ` · $${d.entry_fee}` : '';
                return `
                    <div class="draft-entry">
                        <div class="draft-row" onclick="toggleRoster(${d.id})" id="row-${d.id}">
                            <span class="dr-chev">▶</span>
                            <span class="dr-date">${ymd(d.drafted_at || d.created_at)}</span>
                            <span class="dr-pick">Pick ${d.my_position}${fee}</span>
                            <span class="dr-build">${buildType(picks)}</span>
                        </div>
                        <div class="draft-roster" id="roster-${d.id}">
                            <div class="draft-picks-grid">${roster}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        function toggleRoster(id) {
            document.getElementById(`row-${id}`)?.classList.toggle('open');
            document.getElementById(`roster-${id}`)?.classList.toggle('open');
        }

        // Extract 6+ digit DK draft/contest IDs from a paste (raw IDs or full URLs).
        function parseDraftIds(text) {
            return [...new Set((text.match(/\d{6,}/g) || []))];
        }

        function renderSyncResults(results) {
            const box = document.getElementById('syncResults');
            if (!results.length) { box.style.display = 'none'; return; }
            const order = { imported: 0, updated: 1, incomplete: 2, no_picks: 3, error: 4, duplicate: 5 };
            const sorted = [...results].sort((a, b) => (order[a.status] ?? 9) - (order[b.status] ?? 9));
            box.innerHTML = sorted.map(r => `
                <div class="sr-row">
                    <span class="sr-status sr-${r.status}">${r.status}</span>
                    <span class="sr-id">${r.contest_id}</span>
                    <span class="sr-reason">${r.reason || (r.my_picks ? r.my_picks + ' picks' : '')}</span>
                </div>`).join('');
            box.style.display = 'block';
        }

        async function syncFromDK() {
            const btn = document.getElementById('syncBtn');
            const status = document.getElementById('syncStatus');
            const ids = parseDraftIds(document.getElementById('syncIds').value);
            btn.disabled = true;
            btn.textContent = 'Syncing…';
            status.style.color = 'var(--muted)';
            status.textContent = ids.length
                ? `Pulling ${ids.length} draft(s) from DraftKings…`
                : 'Pulling completed drafts from DraftKings…';
            try {
                const resp = await fetch('/api/drafts/sync-from-dk', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ids.length ? { ids } : {}),
                });
                const data = await resp.json();
                if (!resp.ok) {
                    status.style.color = 'var(--red, #c0392b)';
                    status.textContent = data.error || 'Sync failed';
                    return;
                }
                const r = data.results || [];
                renderSyncResults(r);
                const tally = r.reduce((m, x) => (m[x.status] = (m[x.status] || 0) + 1, m), {});
                const parts = Object.entries(tally).map(([k, v]) => `${v} ${k}`);
                const changed = (tally.imported || 0) + (tally.updated || 0);
                status.style.color = changed ? 'var(--green)' : 'var(--muted)';
                status.textContent = changed
                    ? `✓ ${tally.imported || 0} imported, ${tally.updated || 0} updated — ${parts.join(', ')}`
                    : `No changes — ${parts.join(', ') || 'nothing to sync'}`;
                await load();
            } catch (e) {
                status.style.color = 'var(--red, #c0392b)';
                status.textContent = 'Sync failed: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sync from DK';
            }
        }


        load();
    </script>
</body>
</html>
