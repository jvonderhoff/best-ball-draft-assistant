<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Rankings — Best Ball Assistant</title>
  <script src="/static/theme.js"></script>
  <link rel="stylesheet" href="/static/theme.css?v=3">
  <style>
    :root {
      --bg:      #0f1419;
      --panel:   #0f1419;
      --card:    #0f1419;
      --card-hi: #1a2f4d;
      --hover:   #131d2a;
      --selected: #1a2f4d;
    }
    .nav-spacer { flex: 1; }

    /* ── Page layout ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 20px; }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .page-title { font-size: 1.4em; font-weight: 700; color: var(--accent); }
    .page-subtitle { font-size: 0.82em; color: var(--muted2); margin-top: 2px; }

    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Buttons ── */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.85em;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #1565c0; color: #fff; }
    .btn-success { background: #2e7d32; color: #a5d6a7; }
    .btn-export  { background: #6a1b9a; color: #ce93d8; }
    .btn-reset   { background: #263238; color: #78909c; }
    .btn-sm { padding: 4px 10px; font-size: 0.78em; }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 280px; }
    .search-wrap input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px 7px 30px;
      color: var(--text);
      font-size: 0.85em;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted2);
      font-size: 0.9em;
    }

    .pos-tabs { display: flex; gap: 4px; }
    .pos-tab {
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-size: 0.8em;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }
    .pos-tab:hover { border-color: var(--muted); color: var(--text); }
    .pos-tab.active { background: var(--selected); border-color: var(--accent); color: var(--accent); }
    .pos-tab[data-pos="QB"].active  { background: #3a0629; border-color: #f48fb1; color: #f48fb1; }
    .pos-tab[data-pos="RB"].active  { background: #0d2a5e; border-color: #90caf9; color: #90caf9; }
    .pos-tab[data-pos="WR"].active  { background: #0d3318; border-color: #a5d6a7; color: #a5d6a7; }
    .pos-tab[data-pos="TE"].active  { background: #4a1c00; border-color: #ffcc80; color: #ffcc80; }

    .toolbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    .count-label { font-size: 0.78em; color: var(--muted2); }

    /* ── Status bar ── */
    #statusBar {
      font-size: 0.8em;
      padding: 6px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: none;
    }
    #statusBar.info  { background: var(--selected); color: var(--accent); display: block; }
    #statusBar.ok    { background: #1b3a22; color: #a5d6a7; display: block; }
    #statusBar.error { background: #3a1515; color: #ef9a9a; display: block; }

    /* ── CSV import modal ── */
    #csvModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
    #csvModal.open { display:flex; }
    #csvModalBox { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; max-width:600px; width:92%; max-height:82vh; display:flex; flex-direction:column; gap:12px; }
    #csvModalBox h3 { margin:0; font-size:1em; color:var(--text); }
    #csvModalBox .csv-sub { font-size:0.78em; color:var(--muted2); }
    #csvPreviewTable { overflow-y:auto; flex:1; }
    #csvPreviewTable table { width:100%; border-collapse:collapse; font-size:0.8em; }
    #csvPreviewTable th { position:sticky; top:0; background:var(--surface); color:var(--muted2); text-align:left; padding:4px 6px; border-bottom:1px solid var(--border); }
    #csvPreviewTable td { padding:4px 6px; border-bottom:1px solid var(--border2,#2a2a2a); }
    #csvPreviewTable .pos-tag { font-size:0.75em; font-weight:700; padding:1px 4px; border-radius:3px; }
    .csv-modal-actions { display:flex; gap:8px; justify-content:flex-end; }
    .csv-no-match { color:var(--muted2); font-style:italic; }

    /* ── Table ── */
    .table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--card-hi);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.72em;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--text); }
    thead th.sorted-asc::after  { content: ' ↑'; color: var(--accent); }
    thead th.sorted-desc::after { content: ' ↓'; color: var(--accent); }

    tbody tr {
      border-bottom: 1px solid var(--row-border);
      transition: background 0.1s;
      cursor: grab;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--hover); }
    tbody tr.dragging { opacity: 0.4; cursor: grabbing; }
    tbody tr.drag-over { border-top: 2px solid var(--accent); }

    td { padding: 8px 12px; font-size: 0.85em; vertical-align: middle; }

    .col-handle { width: 24px; color: var(--border); font-size: 1em; cursor: grab; padding-right: 4px; touch-action: none; user-select: none; -webkit-user-select: none; }
    @media (max-width: 600px) { .col-handle { font-size: 1.3em; padding: 6px 8px; } }
    .col-rank   { width: 110px; }
    .col-name   { min-width: 160px; }
    .col-pos    { width: 60px; }
    .col-team   { width: 60px; color: var(--muted); }
    .col-adp    { width: 70px; color: var(--muted); text-align: right; }
    .col-delta  { width: 70px; text-align: right; }
    .col-notes  { min-width: 160px; }
    .col-action { width: 60px; text-align: center; }

    /* Rank cell — input + arrow buttons side by side */
    .rank-cell { display: flex; align-items: center; gap: 5px; }
    .rank-arrows { display: flex; flex-direction: column; gap: 1px; }
    .btn-rank-arrow {
      background: none; border: none; color: #37474f; cursor: pointer;
      font-size: 0.6em; padding: 1px 3px; line-height: 1; border-radius: 2px;
    }
    .btn-rank-arrow:hover { color: #4fc3f7; background: #1a2f4d; }

    /* Rank input */
    .rank-input {
      width: 50px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-size: 0.9em;
      font-weight: 700;
      padding: 3px 6px;
      text-align: center;
      outline: none;
    }
    .rank-input:focus { border-color: #4fc3f7; background: #1a2f4d; color: #e0e0e0; }
    .rank-input.unranked { color: #37474f; border-color: #1e2d3a; }
    /* Hide native browser spinner arrows — we use our own ▲▼ buttons */
    .rank-input::-webkit-outer-spin-button,
    .rank-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .rank-input[type=number] { -moz-appearance: textfield; }

    /* Notes input */
    .notes-input {
      width: 100%;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: #90a4ae;
      font-size: 0.82em;
      padding: 3px 6px;
      outline: none;
      font-family: inherit;
    }
    .notes-input:focus { border-color: #2a3f5f; background: #1a2a3a; color: #e0e0e0; }
    .notes-input::placeholder { color: #2a3f5f; }

    /* Position badge */
    .pos-badge {
      font-size: 0.7em;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .pos-QB { background: #880e4f; color: #f48fb1; }
    .pos-RB { background: #0d47a1; color: #90caf9; }
    .pos-WR { background: #1b5e20; color: #a5d6a7; }
    .pos-TE { background: #e65100; color: #ffcc80; }

    /* Delta badge */
    .delta-up   { color: #66bb6a; font-size: 0.8em; }
    .delta-down { color: #ef5350; font-size: 0.8em; }
    .delta-flat { color: #546e7a; font-size: 0.8em; }

    /* Clear rank btn */
    .btn-clear-rank {
      background: none;
      border: none;
      color: #37474f;
      cursor: pointer;
      font-size: 1em;
      padding: 2px 4px;
      border-radius: 3px;
      line-height: 1;
    }
    .btn-clear-rank:hover { color: #ef5350; background: #2a1515; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #37474f;
    }
    .empty-state .emoji { font-size: 2.5em; margin-bottom: 12px; }

    /* Unsaved dot */
    .unsaved-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ffa726;
      margin-left: 6px;
      vertical-align: middle;
      display: none;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      display: none;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #0f1419;
      border: 1px solid #2a3f5f;
      border-radius: 10px;
      padding: 28px 32px;
      max-width: 400px;
      width: 90%;
    }
    .modal h3 { color: #4fc3f7; margin-bottom: 8px; }
    .modal p  { color: #78909c; font-size: 0.88em; margin-bottom: 20px; line-height: 1.5; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      nav { padding: 0 12px; gap: 14px; height: 46px; }
      nav a { font-size: 0.8em; }
      .page { padding: 12px; }
      .page-title { font-size: 1.1em; }
      .page-subtitle { font-size: 0.75em; }
      .header-actions { width: 100%; }
      .header-actions .btn { flex: 1; text-align: center; font-size: 0.78em; padding: 8px 6px; }
      .toolbar { gap: 8px; }
      .search-wrap { max-width: 100%; }
      .pos-tab { padding: 5px 8px; font-size: 0.75em; }
      .toolbar-right { margin-left: 0; width: 100%; justify-content: flex-end; }
      /* Hide less-critical table columns on mobile */
      .col-delta, .col-notes, .col-action { display: none; }
      thead th.col-delta, thead th.col-notes, thead th.col-action { display: none; }
      td { padding: 7px 8px; font-size: 0.82em; }
      .rank-input { width: 44px; font-size: 0.85em; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/recommend">Live Draft</a>
  <a href="/history">History</a>
  <a href="/rankings" class="active">Rankings</a>
  <a href="/analysis">Analysis</a>
  <a href="/setup">Setup</a>
  <button class="theme-toggle" onclick="toggleTheme()"><!-- label via CSS ::after --></button>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Player Rankings</div>
      <div class="page-subtitle">Drag to reorder · Edit rank numbers · Changes auto-highlight until saved</div>
    </div>
    <div class="header-actions">
      <button class="btn btn-reset" id="refreshAdpBtn" title="Pull latest ADP from DraftKings (keeps your custom ranks &amp; notes)">↻ Refresh ADP</button>
      <button class="btn btn-reset" id="importCsvBtn" title="Import custom rankings from a CSV file">Import CSV</button>
      <input type="file" id="csvFileInput" accept=".csv" style="display:none">
      <button class="btn btn-export" id="exportBtn">Export to Extension</button>
      <button class="btn btn-success" id="saveBtn">
        Save Rankings
        <span class="unsaved-dot" id="unsavedDot"></span>
      </button>
    </div>
  </div>

  <div id="statusBar"></div>

  <!-- CSV import preview modal -->
  <div id="csvModal">
    <div id="csvModalBox">
      <h3>Import Rankings from CSV — Preview</h3>
      <div class="csv-sub" id="csvModalSub"></div>
      <div id="csvPreviewTable"></div>
      <div class="csv-modal-actions">
        <button class="btn btn-reset" onclick="closeCsvModal()">Cancel</button>
        <button class="btn btn-success" onclick="applyCsvImport()">Apply Import</button>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search players…">
    </div>
    <div class="pos-tabs">
      <button class="pos-tab active" data-pos="ALL">All</button>
      <button class="pos-tab" data-pos="QB">QB</button>
      <button class="pos-tab" data-pos="RB">RB</button>
      <button class="pos-tab" data-pos="WR">WR</button>
      <button class="pos-tab" data-pos="TE">TE</button>
    </div>
    <div class="toolbar-right">
      <span class="count-label" id="countLabel"></span>
      <button class="btn btn-reset btn-sm" id="sortRankBtn">Sort by My Rank</button>
      <button class="btn btn-reset btn-sm" id="sortAdpBtn">Sort by DK ADP</button>
    </div>
  </div>

  <div class="table-wrap">
    <table id="rankingsTable">
      <thead>
        <tr>
          <th class="col-handle"></th>
          <th class="col-rank">My Rank</th>
          <th class="col-name sortable" data-sort="name">Player</th>
          <th class="col-pos">Pos</th>
          <th class="col-team">Team</th>
          <th class="col-adp sortable" data-sort="adp">DK ADP</th>
          <th class="col-delta">vs ADP</th>
          <th class="col-notes">Notes</th>
          <th class="col-action"></th>
        </tr>
      </thead>
      <tbody id="rankingsBody">
        <tr><td colspan="9"><div class="empty-state"><div class="emoji">⏳</div>Loading…</div></td></tr>
      </tbody>
    </table>
  </div>
</div>



<script>
// ── State ──────────────────────────────────────────────────────────────────────
let allPlayers = [];    // full list from API
let displayed  = [];    // currently shown rows (filtered/sorted)
let dirty      = false;
let filterPos  = 'ALL';
let searchQ    = '';

// ── Helpers ────────────────────────────────────────────────────────────────────
function setStatus(msg, type = 'info') {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg;
  bar.className = type;
  if (type === 'ok') setTimeout(() => { bar.style.display = 'none'; bar.className = ''; }, 3000);
}

function markDirty() {
  dirty = true;
  document.getElementById('unsavedDot').style.display = 'inline-block';
}
function markClean() {
  dirty = false;
  document.getElementById('unsavedDot').style.display = 'none';
}

function posBadge(pos) {
  return `<span class="pos-badge pos-${pos}">${pos}</span>`;
}

function deltaHtml(customRank, adp) {
  if (customRank == null || adp == null) return '<span class="delta-flat">—</span>';
  const d = Math.round((adp - customRank) * 10) / 10;
  if (d > 0)  return `<span class="delta-up">+${d.toFixed(1)} ▲</span>`;
  if (d < 0)  return `<span class="delta-down">${d.toFixed(1)} ▼</span>`;
  return `<span class="delta-flat">—</span>`;
}

// ── Load ───────────────────────────────────────────────────────────────────────
async function loadRankings() {
  try {
    const res = await fetch('/api/rankings');
    allPlayers = await res.json();
    renderTable();
  } catch (e) {
    setStatus('Failed to load players: ' + e.message, 'error');
  }
}

// ── Filter + render ────────────────────────────────────────────────────────────
function getFiltered() {
  let list = allPlayers;
  if (filterPos !== 'ALL') list = list.filter(p => p.pos === filterPos);
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(p =>
      p.name.toLowerCase().includes(q) ||
      p.team.toLowerCase().includes(q)
    );
  }
  return list;
}

function renderTable() {
  displayed = getFiltered();
  document.getElementById('countLabel').textContent = `${displayed.length} players`;

  const tbody = document.getElementById('rankingsBody');
  if (!displayed.length) {
    tbody.innerHTML = '<tr><td colspan="9"><div class="empty-state"><div class="emoji">🔍</div>No players match</div></td></tr>';
    return;
  }

  tbody.innerHTML = displayed.map((p, i) => `
    <tr draggable="true" data-id="${p.player_id}" data-idx="${i}">
      <td class="col-handle" title="Drag to reorder">⠿</td>
      <td class="col-rank">
        <div class="rank-cell">
          <input class="rank-input ${p.custom_rank == null ? 'unranked' : ''}"
                 type="number" min="1" max="9999"
                 value="${p.custom_rank ?? ''}"
                 placeholder="—"
                 data-id="${p.player_id}"
                 data-orig="${p.custom_rank ?? ''}">
          <div class="rank-arrows">
            <button class="btn-rank-arrow btn-rank-up" data-id="${p.player_id}" title="Move up">▲</button>
            <button class="btn-rank-arrow btn-rank-dn" data-id="${p.player_id}" title="Move down">▼</button>
          </div>
        </div>
      </td>
      <td class="col-name">${p.name}</td>
      <td class="col-pos">${posBadge(p.pos)}</td>
      <td class="col-team">${p.team}</td>
      <td class="col-adp">${p.adp != null ? Number(p.adp).toFixed(1) : '—'}</td>
      <td class="col-delta" data-id="${p.player_id}-delta">${deltaHtml(p.custom_rank, p.adp)}</td>
      <td class="col-notes">
        <input class="notes-input" type="text"
               placeholder="Add notes…"
               value="${escHtml(p.notes || '')}"
               data-id="${p.player_id}"
               data-field="notes">
      </td>
      <td class="col-action">
        <button class="btn-clear-rank" data-id="${p.player_id}" title="Remove custom rank">✕</button>
      </td>
    </tr>
  `).join('');

  bindRowEvents(tbody);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Move player by rank delta (swap with neighbour) ───────────────────────────
function movePlayer(pid, delta) {
  const p = allPlayers.find(p => p.player_id === pid);
  if (!p || p.custom_rank == null) return;
  const targetRank = p.custom_rank + delta;
  if (targetRank < 1) return;
  // Swap with whoever holds the target rank
  const other = allPlayers.find(o => o.player_id !== pid && o.custom_rank === targetRank);
  if (other) other.custom_rank = p.custom_rank;
  p.custom_rank = targetRank;
  allPlayers.sort((a, b) => (a.custom_rank || 9999) - (b.custom_rank || 9999));
  renderTable();
  markDirty();
}

// ── Insert player at a new rank, shifting others to make room ─────────────────
function insertAtRank(pid, newRank) {
  const p = allPlayers.find(p => p.player_id === pid);
  if (!p || isNaN(newRank) || newRank < 1) return;
  const oldRank = p.custom_rank;
  if (newRank === oldRank) return;

  if (oldRank == null) {
    // Unranked player being given a rank — shift everyone at newRank+ down
    allPlayers.forEach(o => {
      if (o.player_id !== pid && o.custom_rank != null && o.custom_rank >= newRank) {
        o.custom_rank++;
      }
    });
  } else if (newRank < oldRank) {
    // Moving up — shift players in [newRank, oldRank-1] down by 1
    allPlayers.forEach(o => {
      if (o.player_id !== pid && o.custom_rank != null &&
          o.custom_rank >= newRank && o.custom_rank < oldRank) {
        o.custom_rank++;
      }
    });
  } else {
    // Moving down — shift players in [oldRank+1, newRank] up by 1
    allPlayers.forEach(o => {
      if (o.player_id !== pid && o.custom_rank != null &&
          o.custom_rank > oldRank && o.custom_rank <= newRank) {
        o.custom_rank--;
      }
    });
  }
  p.custom_rank = newRank;
  allPlayers.sort((a, b) => (a.custom_rank || 9999) - (b.custom_rank || 9999));
}

// ── Row events ─────────────────────────────────────────────────────────────────
function bindRowEvents(tbody) {
  // Rank input — auto-shift others when a rank is entered
  tbody.querySelectorAll('.rank-input').forEach(inp => {
    inp.addEventListener('change', () => {
      const pid = inp.dataset.id;
      const val = inp.value.trim() === '' ? null : parseInt(inp.value, 10);
      if (val === null) {
        updatePlayerField(pid, 'custom_rank', null);
        inp.classList.add('unranked');
        markDirty();
        return;
      }
      insertAtRank(pid, val);
      renderTable();
      markDirty();
    });
    // Arrow keys nudge rank by 1
    inp.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
        e.preventDefault();
        movePlayer(inp.dataset.id, e.key === 'ArrowUp' ? -1 : 1);
      }
    });
  });

  // ▲▼ buttons
  tbody.querySelectorAll('.btn-rank-up').forEach(btn => {
    btn.addEventListener('click', () => { movePlayer(btn.dataset.id, -1); });
  });
  tbody.querySelectorAll('.btn-rank-dn').forEach(btn => {
    btn.addEventListener('click', () => { movePlayer(btn.dataset.id, +1); });
  });

  // Notes input changes
  tbody.querySelectorAll('.notes-input').forEach(inp => {
    inp.addEventListener('blur', () => {
      updatePlayerField(inp.dataset.id, 'notes', inp.value);
      markDirty();
    });
  });

  // Clear rank buttons
  tbody.querySelectorAll('.btn-clear-rank').forEach(btn => {
    btn.addEventListener('click', () => {
      const pid = btn.dataset.id;
      updatePlayerField(pid, 'custom_rank', null);
      const rankInp = tbody.querySelector(`.rank-input[data-id="${pid}"]`);
      if (rankInp) { rankInp.value = ''; rankInp.classList.add('unranked'); }
      const p = allPlayers.find(p => p.player_id === pid);
      if (p) {
        p.custom_rank = null;
        const deltaCell = tbody.querySelector(`[data-id="${pid}-delta"]`);
        if (deltaCell) deltaCell.innerHTML = deltaHtml(null, p.adp);
      }
      markDirty();
    });
  });

  // ── Drag + Touch reorder ──────────────────────────────────────────────────
  let dragSrc = null;

  function reorderRows(fromId, toId) {
    const fromI = displayed.findIndex(p => p.player_id === fromId);
    const toI   = displayed.findIndex(p => p.player_id === toId);
    if (fromI === -1 || toI === -1 || fromI === toI) return;
    const [moved] = displayed.splice(fromI, 1);
    displayed.splice(toI, 0, moved);
    displayed.forEach((p, i) => {
      const g = allPlayers.find(a => a.player_id === p.player_id);
      if (g) g.custom_rank = i + 1;
      p.custom_rank = i + 1;
    });
    renderTable();
    markDirty();
  }

  function rowAtY(y) {
    for (const r of tbody.querySelectorAll('tr[data-id]')) {
      const rect = r.getBoundingClientRect();
      if (y >= rect.top && y <= rect.bottom) return r;
    }
    return null;
  }

  tbody.querySelectorAll('tr[draggable]').forEach(row => {
    // ── Mouse drag ──
    row.addEventListener('dragstart', e => {
      dragSrc = row;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      if (row !== dragSrc) row.classList.add('drag-over');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      if (!dragSrc || dragSrc === row) return;
      row.classList.remove('drag-over');
      reorderRows(dragSrc.dataset.id, row.dataset.id);
    });

    // ── Touch drag (mobile) ──
    const handle = row.querySelector('.col-handle');
    if (!handle) return;

    handle.addEventListener('touchstart', e => {
      dragSrc = row;
      row.classList.add('dragging');
      // prevent page scroll while dragging
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', e => {
      e.preventDefault();
      const touch = e.touches[0];
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      const target = rowAtY(touch.clientY);
      if (target && target !== dragSrc) target.classList.add('drag-over');
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      const touch = e.changedTouches[0];
      tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
      row.classList.remove('dragging');
      if (!dragSrc) return;
      const target = rowAtY(touch.clientY);
      if (target && target !== dragSrc) reorderRows(dragSrc.dataset.id, target.dataset.id);
      dragSrc = null;
    });
  });
}

function updatePlayerField(pid, field, value) {
  const p = allPlayers.find(p => p.player_id === pid);
  if (p) p[field] = value;
}

// ── Save ───────────────────────────────────────────────────────────────────────
async function saveRankings() {
  const rankings = allPlayers.map(p => ({
    player_id:   p.player_id,
    custom_rank: p.custom_rank ?? null,
    notes:       p.notes || '',
  }));

  setStatus('Saving…', 'info');
  try {
    const res = await fetch('/api/rankings/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rankings }),
    });
    const data = await res.json();
    if (data.ok) {
      setStatus(`✓ Saved ${data.saved} player rankings`, 'ok');
      markClean();
    } else {
      setStatus('Error: ' + (data.error || 'unknown'), 'error');
    }
  } catch (e) {
    setStatus('Save failed: ' + e.message, 'error');
  }
}

// ── Export ─────────────────────────────────────────────────────────────────────
async function exportToExtension() {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true;
  setStatus('Exporting players.js…', 'info');
  try {
    const res = await fetch('/api/rankings/export', { method: 'POST' });
    const data = await res.json();
    if (data.ok) {
      setStatus(`✓ Exported ${data.players} players to extension — reload the extension in about:debugging then refresh the DK tab`, 'ok');
    } else {
      setStatus('Export error: ' + (data.error || 'unknown'), 'error');
    }
  } catch (e) {
    setStatus('Export failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

// ── CSV Import ────────────────────────────────────────────────────────────────
// Accepts any CSV with at least a rank column and a name column.
// Detects headers automatically; tries common names like Rank, Overall, Name, Player.
// Matches by normalized name (lowercase, strip suffixes/punctuation).
// Only updates players that exist in allPlayers; unmatched rows are shown but skipped.

let _csvPending = [];  // { player, csvRank } pairs staged for apply

function _normName(s) {
  return (s || '').toLowerCase()
    .replace(/\b(jr\.?|sr\.?|ii|iii|iv)\b/g, '')
    .replace(/[^a-z ]/g, '')
    .replace(/\s+/g, ' ').trim();
}

function parseCsvImport(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return null;

  // Parse header
  const sep = lines[0].includes('\t') ? '\t' : ',';
  const headers = lines[0].split(sep).map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());

  // Find rank column: 'rank', 'overall', 'overall rank', 'rk'
  const rankCol = headers.findIndex(h => /^(rank|overall|overall rank|rk)$/.test(h));
  // Find name column: 'player', 'name', 'player name'
  const nameCol = headers.findIndex(h => /^(player|name|player name)$/.test(h));

  if (rankCol === -1 || nameCol === -1) return { error: `Could not find rank/name columns. Headers found: ${headers.join(', ')}` };

  // Build name → player map from allPlayers
  const nameMap = {};
  allPlayers.forEach(p => { nameMap[_normName(p.name)] = p; });

  const matched = [], unmatched = [];
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(sep).map(c => c.trim().replace(/^"|"$/g, ''));
    const csvRank = parseInt(cols[rankCol]);
    const csvName = cols[nameCol];
    if (!csvName || isNaN(csvRank)) continue;
    const player = nameMap[_normName(csvName)];
    if (player) matched.push({ player, csvRank, csvName });
    else unmatched.push({ csvRank, csvName });
  }
  return { matched, unmatched };
}

function openCsvImport(text) {
  const result = parseCsvImport(text);
  if (!result) { setStatus('CSV appears empty.', 'error'); return; }
  if (result.error) { setStatus(result.error, 'error'); return; }

  const { matched, unmatched } = result;
  _csvPending = matched;

  const posColor = { QB: 'var(--QB)', RB: 'var(--RB)', WR: 'var(--WR)', TE: 'var(--TE)' };
  const rows = matched.map(({ player: p, csvRank }) => {
    const was = p.custom_rank != null ? `was ${p.custom_rank}` : 'unranked';
    return `<tr>
      <td>${csvRank}</td>
      <td><span class="pos-tag" style="background:${posColor[p.pos]||'#555'};color:#fff;padding:1px 4px;border-radius:3px;font-size:0.75em">${p.pos}</span> ${p.name}</td>
      <td>${p.team}</td>
      <td style="color:var(--muted2)">${p.adp}</td>
      <td style="color:var(--muted2);font-style:italic">${was}</td>
    </tr>`;
  }).join('');

  const unmatchedNote = unmatched.length
    ? `<div style="margin-top:8px;font-size:0.75em;color:var(--muted2)">${unmatched.length} rows not matched: ${unmatched.slice(0,5).map(u => u.csvName).join(', ')}${unmatched.length > 5 ? '…' : ''}</div>`
    : '';

  document.getElementById('csvModalSub').innerHTML =
    `${matched.length} players will have their custom rank updated.` + unmatchedNote;
  document.getElementById('csvPreviewTable').innerHTML = `
    <table>
      <thead><tr><th>CSV Rank</th><th>Player</th><th>Team</th><th>DK ADP</th><th>Previous</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  document.getElementById('csvModal').classList.add('open');
}

function closeCsvModal() {
  document.getElementById('csvModal').classList.remove('open');
  _csvPending = [];
}

function applyCsvImport() {
  _csvPending.forEach(({ player, csvRank }) => { player.custom_rank = csvRank; });
  markDirty();
  renderTable();
  const n = _csvPending.length;
  closeCsvModal();
  setStatus(`Imported ${n} rankings from CSV — review and save when ready.`, 'ok');
}

document.getElementById('importCsvBtn').addEventListener('click', () => {
  document.getElementById('csvFileInput').click();
});
document.getElementById('csvFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => openCsvImport(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';  // reset so same file can be re-imported
});

// ── Reset ──────────────────────────────────────────────────────────────────────


// ── Sort by My Rank ────────────────────────────────────────────────────────────
// Sorts display by custom rank (unranked players go to the bottom).
function sortByCustomRank() {
  allPlayers.sort((a, b) => (a.custom_rank || 9999) - (b.custom_rank || 9999));
  renderTable();
}

// ── Sort by DK ADP ─────────────────────────────────────────────────────────────
// Sorts the display by ADP without assigning or overwriting custom ranks.
function sortByAdp() {
  allPlayers.sort((a, b) => (a.adp || 9999) - (b.adp || 9999));
  renderTable();
}

// ── Header sort ────────────────────────────────────────────────────────────────
let sortCol = null, sortDir = 1;
document.querySelectorAll('thead th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.sort;
    if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
    document.querySelectorAll('thead th').forEach(h => h.classList.remove('sorted-asc','sorted-desc'));
    th.classList.add(sortDir === 1 ? 'sorted-asc' : 'sorted-desc');
    allPlayers.sort((a, b) => {
      let va = a[col], vb = b[col];
      if (col === 'name') return sortDir * (va || '').localeCompare(vb || '');
      return sortDir * ((va ?? 9999) - (vb ?? 9999));
    });
    renderTable();
  });
});

// ── Keyboard save ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    saveRankings();
  }
});

// ── Refresh ADP ────────────────────────────────────────────────────────────────
async function refreshAdp() {
  const btn = document.getElementById('refreshAdpBtn');
  btn.disabled = true;
  btn.textContent = '↻ Fetching…';
  setStatus('Pulling latest ADP from DraftKings…', 'info');
  try {
    const res = await fetch('/api/players/refresh', { method: 'POST' });
    const data = await res.json();
    if (data.success) {
      setStatus(`✓ ADP updated — ${data.player_count} players. Your custom ranks and notes are unchanged.`, 'ok');
      await loadRankings();
    } else {
      setStatus('ADP refresh failed: ' + (data.error || 'unknown error'), 'error');
    }
  } catch (e) {
    setStatus('ADP refresh failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Refresh ADP';
  }
}

// ── Wire up controls ───────────────────────────────────────────────────────────
document.getElementById('refreshAdpBtn').addEventListener('click', refreshAdp);
document.getElementById('saveBtn').addEventListener('click', saveRankings);
document.getElementById('exportBtn').addEventListener('click', exportToExtension);
document.getElementById('sortRankBtn').addEventListener('click', sortByCustomRank);
document.getElementById('sortAdpBtn').addEventListener('click', sortByAdp);


document.querySelectorAll('.pos-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.pos-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    filterPos = tab.dataset.pos;
    renderTable();
  });
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.trim();
  renderTable();
});

window.addEventListener('beforeunload', e => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

loadRankings();
