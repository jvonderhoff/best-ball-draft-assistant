services:
  - type: web
    name: best-ball-assistant
    runtime: python
    rootDir: fantasy_football/best-ball-draft
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT "app.app:app"
    buildFilter:
      ignoredPaths:
        - fantasy_football/best-ball-draft/app/data/rankings_seed.json
    envVars:
      - key: BBA_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      # Fine-grained PAT with Contents: Read and write on this repo. Set the value
      # in the Render dashboard (sync:false keeps the secret out of the repo).
      # Without it, live ranking edits won't persist across deploys.
      - key: GITHUB_TOKEN
        sync: false
