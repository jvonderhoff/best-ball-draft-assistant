services:
  - type: web
    name: best-ball-assistant
    runtime: python
    rootDir: fantasy_football/best-ball-draft
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 120 -b 0.0.0.0:$PORT "app.app:app"
    buildFilter:
      ignoredPaths:
        - fantasy_football/best-ball-draft/app/data/rankings_seed.json
    envVars:
      - key: BBA_API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0
      # Durable Postgres connection string (Neon / Supabase / Render PG / …).
      # Custom rankings live here so they survive ephemeral-filesystem resets
      # (deploys AND free-tier spin-downs). Set the value in the Render dashboard
      # (sync:false keeps the secret out of the repo). Without it, rankings fall
      # back to the ephemeral local SQLite DB and won't persist.
      - key: DATABASE_URL
        sync: false
